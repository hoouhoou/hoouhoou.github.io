<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bravo Master Archive</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <header>
        <h1>SCALEUS // ARCHIVE</h1>
        <div>
            <button class="btn-manage" onclick="toggleGen()">Manage Data</button>
            <button class="btn-logout" onclick="location.href='index.html'">Logout</button>
        </div>
    </header>

    <div id="generator-panel" style="display:none; background:#fff; margin:20px 40px; padding:20px; border-radius:12px; border:2px dashed #337ab7;">
        <h3>Bulk Setlist Generator</h3>
        <input type="text" id="globalDate" placeholder="Date (e.g. 7 Jan 2025)" style="padding:10px; margin-bottom:10px;">
        <input type="text" id="fileName" placeholder="Filename (e.g. jan_07)" style="padding:10px; margin-bottom:10px;">
        <textarea id="rawInput" style="width:100%; height:80px;" placeholder="Paste song list here..."></textarea>
        <button onclick="processAndDownload()" class="btn-manage" style="width:100%; margin-top:10px;">Download .txt</button>
    </div>

    <div id="breadcrumb-nav" class="breadcrumb">Dashboard</div>
    
    <div id="lists-container" class="archive-grid"></div>

    <script src="script.js?v=1.1"></script>
    <script>loadMasterLists();</script>
</body>
</html>
