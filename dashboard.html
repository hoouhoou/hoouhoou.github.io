<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bravo Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>MASTER LIST</h1>
        <div class="header-actions">
            <button onclick="toggleGenerator()" class="admin-btn">Manage Data</button>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <div id="generator-section" class="generator-panel" style="display: none;">
        <h3>Bulk Data Generator</h3>
        <div class="gen-inputs">
            <input type="text" id="globalDate" placeholder="Date (e.g., 7 Jan 2025)">
            <input type="text" id="fileName" placeholder="File Name (e.g., jan_07)">
        </div>
        <textarea id="rawInput" placeholder="Paste your list here...&#10;1. INTRO&#10;2. YESTERDAY - THE BRAVO TRIO BAND&#10;3. SPIEL..."></textarea>
        <button onclick="processAndDownload()" class="btn-save">Process & Download .txt</button>
    </div>

    <div id="lists-container" class="list-grid"></div>

    <script src="script.js"></script>
    <script>
        // Runs as soon as page loads
        loadMasterLists();
    </script>
</body>
</html>
