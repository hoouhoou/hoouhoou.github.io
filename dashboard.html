<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master List Responsive Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-gold: #f9bf77;
            --sidebar-brown: #462c1f;
            --bg-cream: #fdf3e7;
            --text-dark: #462c1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ccc;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Allows scrolling on smaller screens */
            min-height: 100vh;
            padding: 10px;
        }

        /* 1. FLEXIBLE CONTAINER */
        .tablet-screen {
            width: 100%;
            max-width: 1100px; /* Limits size on huge monitors */
            min-height: 90vh;
            background-color: var(--bg-cream);
            position: relative;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(#f2e4d4 2px, transparent 2px);
            background-size: 40px 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 2. DYNAMIC HEADER */
        header {
            background-color: var(--header-gold);
            padding: 30px 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom-left-radius: 40px;
            z-index: 2;
        }

        header h1 {
            font-family: 'Amatic SC', cursive;
            font-size: clamp(50px, 10vw, 90px); /* Resizes font based on screen width */
            color: var(--text-dark);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
        }

        .main-layout {
            display: flex;
            flex-direction: column; /* Stacks on mobile */
            flex: 1;
        }

        /* 3. RESPONSIVE GRID */
        .grid-container {
            flex: 1;
            padding: 20px;
            display: grid;
            /* Automatically creates columns based on space */
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 20px;
        }

        .cake-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cake-image {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #fff;
            border-radius: 30px;
            margin-bottom: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .cake-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            max-width: 90%;
        }

        /* 4. SIDEBAR ADAPTATION */
        .sidebar {
            background-color: var(--sidebar-brown);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            gap: 20px;
        }

        .home-link {
            background-color: white;
            color: var(--sidebar-brown);
            text-decoration: none;
            text-align: center;
            padding: 12px 0;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 5. MEDIA QUERY FOR TABLET/DESKTOP (768px and up) */
        @media (min-width: 768px) {
            .main-layout {
                flex-direction: row; /* Sidebar goes to the side */
            }

            .grid-container {
                grid-template-columns: repeat(3, 1fr); /* 3 columns on larger screens */
                padding: 40px;
                gap: 30px;
            }

            .sidebar {
                width: 280px;
                padding-top: 60px;
            }

            .footer-info {
                margin-top: auto;
            }
        }

        .footer-info {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            text-align: center;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="tablet-screen">
    <header>
        <h1>MASTER LIST</h1>
    </header>

    <div class="main-layout">
        <div class="grid-container">
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Chocolate</div>
            </div>
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1616541823729-00fe0aacd32c?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Red Velvet</div>
            </div>
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Morango</div>
            </div>
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Crocante</div>
            </div>

            <div class="cake-card">
                <a href="classics/dashboard/index.html" style="text-decoration: none; width: 100%; color: inherit;">
                    <div class="cake-image" style="background-image: url('https://cdn.drawception.com/drawings/578851/QyYh6336.png?w=300')"></div>
                    <div class="cake-name">dina nor</div>
                </a>
            </div>

            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.pexels.com/photos/128756/pexels-photo-128756.jpeg?w=300')"></div>
                <div class="cake-name">pis</div>
            </div>
        </div>

        <nav class="sidebar">
            <a href="#" class="home-link">Home</a>
            <a href="#" class="nav-item"><span class="nav-icon">👤</span> RJTV</a>
            <a href="#" class="nav-item"><span class="nav-icon">🛒</span> Deliver this</a>
            <a href="#" class="nav-item"><span class="nav-icon">🚚</span> On my way home</a>
            <a href="#" id="logoutBtn" class="nav-item" style="margin-top: 20px;"><span class="nav-icon">🏃</span> run away</a>
            
            <div class="footer-info">V.0</div>
        </nav>
    </div>
</div>

<script>
    // Logic remains same, but commented out for testing
    // if (sessionStorage.getItem('loggedIn') !== 'true') { window.location.href = 'index.html'; }

    document.getElementById('logoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        sessionStorage.removeItem('loggedIn');
        window.location.href = 'index.html';
    });
</script>

</body>
</html>
