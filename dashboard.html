<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Fiesta Archive</title>
    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body>
    <header style="background: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #f1c40f;">
        <h1 style="margin: 0; color: #e74c3c; font-weight: 900;">FIESTA // <span style="color:#2980b9;">ARCHIVE</span></h1>
        <button onclick="toggleGen()" style="background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:50px; cursor:pointer; font-weight:bold;">+ MANAGE DATA</button>
    </header>

    <div id="generator-panel" style="display:none; background:#fff; margin:20px 40px; padding:25px; border-radius:15px; border:3px dashed #2980b9;">
        <input type="text" id="globalDate" placeholder="Date (e.g. 7 Jan 2025)" style="padding:10px; margin-right:10px;">
        <input type="text" id="fileName" placeholder="File Name (e.g. jan_07)" style="padding:10px;">
        <textarea id="rawInput" style="width:100%; height:80px; margin-top:10px;" placeholder="Paste song list..."></textarea>
        <button onclick="processAndDownload()" style="width:100%; margin-top:10px; background:#e67e22; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">GENERATE .TXT</button>
    </div>

    <div id="breadcrumb-nav" style="padding: 20px 40px; font-weight:bold; color:#2980b9;">Dashboard</div>
    <div id="lists-container" class="archive-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 0 40px 40px;"></div>

    <script src="script.js?v=3.0"></script>
    <script>loadMasterLists();</script>
</body>
</html>
