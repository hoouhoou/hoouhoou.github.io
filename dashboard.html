<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bravo Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>BRAVO MASTER</h1>
        <div class="header-actions">
            <button onclick="toggleGenerator()" class="admin-btn">Manage Data</button>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <div id="generator-section" class="generator-panel" style="display: none;">
        <h3 style="margin-top:0">Bulk Data Generator</h3>
        <div class="gen-inputs">
            <input type="text" id="globalDate" placeholder="Date (e.g., 7 Jan 2025)">
            <input type="text" id="fileName" placeholder="File Name (e.g., jan_07)">
        </div>
        <textarea id="rawInput" style="width:100%; height:150px; margin: 10px 0; box-sizing: border-box;" placeholder="Paste your list here..."></textarea>
        <button onclick="processAndDownload()" class="btn-save">Process & Download .txt</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="filterLists()" placeholder="🔍 Search setlists by date...">
    </div>

    <div id="lists-container" class="list-grid"></div>

    <script src="script.js"></script>
    <script>loadMasterLists();</script>
</body>
</html>
