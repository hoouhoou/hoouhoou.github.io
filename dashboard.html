<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eterna Archive | Dashboard</title>
    <link rel="stylesheet" href="style.css?v=cloud">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>ETERNA<span style="font-weight:400; color:#64748b;">CLOUD</span></h1>
        <div>
            <button class="btn-manage" onclick="toggleGen()">DATABASE TOOLS</button>
            <button onclick="location.href='index.html'" style="background:none; border:none; color:#94a3b8; margin-left:20px; cursor:pointer;">Exit</button>
        </div>
    </header>

    <div id="generator-panel" style="display:none; background:white; margin:20px 40px; padding:30px; border-radius:24px; border:1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
        <h2 style="margin-top:0; font-size:1.2rem;">Data Entry Node</h2>
        <div style="display:flex; gap:15px; margin-bottom:15px;">
            <input type="text" id="globalDate" placeholder="Timestamp (e.g. 7 Jan 2025)" style="flex:1; padding:12px; border:1px solid #e2e8f0; border-radius:10px;">
            <input type="text" id="fileName" placeholder="File Identifier" style="flex:1; padding:12px; border:1px solid #e2e8f0; border-radius:10px;">
        </div>
        <textarea id="rawInput" style="width:100%; height:120px; padding:15px; border:1px solid #e2e8f0; border-radius:10px; font-family:monospace;" placeholder="Insert raw metadata..."></textarea>
        <button onclick="processAndDownload()" class="btn-manage" style="width:100%; margin-top:15px;">EXECUTE DOWNLOAD</button>
    </div>

    <div class="breadcrumb" id="breadcrumb-nav">ROOT / DASHBOARD</div>
    
    <div id="lists-container" class="archive-grid">
        </div>

    <script src="script.js?v=cloud"></script>
    <script>loadMasterLists();</script>
</body>
</html>
