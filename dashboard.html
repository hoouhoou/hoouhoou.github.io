<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master List - Full Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-gold: #f9bf77;
            --sidebar-brown: #462c1f;
            --bg-cream: #fdf3e7;
            --text-dark: #462c1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ccc;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .tablet-screen {
            width: 100%;
            max-width: 1200px;
            background-color: var(--bg-cream);
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(#f2e4d4 2px, transparent 2px);
            background-size: 40px 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header {
            background-color: var(--header-gold);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            border-bottom-left-radius: 40px;
        }

        header h1 {
            font-family: 'Amatic SC', cursive;
            font-size: clamp(40px, 8vw, 80px);
            color: var(--text-dark);
            text-transform: uppercase;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* The Grid: Works on Mobile (1-2 cols) and Desktop (3+ cols) */
        .grid-container {
            flex: 1;
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
        }

        .cake-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cake-image {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #fff;
            border-radius: 35px;
            margin-bottom: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .cake-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .sidebar {
            background-color: var(--sidebar-brown);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .main-layout { flex-direction: row; }
            .sidebar { width: 260px; }
        }

        .home-link {
            background-color: white;
            color: var(--sidebar-brown);
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            font-weight: 700;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-info {
            margin-top: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="tablet-screen">
    <header>
        <h1>MASTER LIST</h1>
    </header>

    <div class="main-layout">
        <div class="grid-container">
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Chocolate</div>
            </div>
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1616541823729-00fe0aacd32c?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Red Velvet</div>
            </div>
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Morango</div>
            </div>
            <div class="cake-card">
                <div class="cake-image" style="background-image: url('https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=300')"></div>
                <div class="cake-name">Pedação de Bolo Crocante</div>
            </div>

           <div class="cake-card"> 
    <a href="classics/dashboard.html" style="text-decoration: none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="cake-image" style="background-image: url('https://cdn.drawception.com/drawings/578851/QyYh6336.png?w=300'); cursor: pointer;"></div>
        <div class="cake-name" style="cursor: pointer;">dina nor</div> 
    </a>
</div>

            <div class="cake-card"> 
                <div class="cake-image" style="background-image: url('https://images.pexels.com/photos/128756/pexels-photo-128756.jpeg?w=300')"></div>
                <div class="cake-name">pis</div> 
            </div>
        </div>

        <nav class="sidebar">
            <a href="#" class="home-link">Home</a>
            <a href="#" class="nav-item"><span>👤</span> RJTV</a>
            <a href="#" class="nav-item"><span>🛒</span> Deliver this</a>
            <a href="#" class="nav-item"><span>🚚</span> On my way</a>
            <a href="#" id="logoutBtn" class="nav-item" style="margin-top: 20px;"><span>🏃</span> run away</a>
            <div class="footer-info">V.0</div>
        </nav>
    </div>
</div>

</body>
</html>
