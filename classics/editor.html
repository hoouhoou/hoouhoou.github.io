<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Schedule & Series Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        .cell-border { border: 1px solid #94a3b8; }
        .input-box { border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 4px; font-size: 13px; width: 100%; }
        .input-box:focus { border-color: #3b82f6; outline: none; background-color: #fff; }
        .table-header { background-color: #b4c7e7; font-weight: bold; font-size: 11px; }
        .day-column { border-right: 2px solid #000; min-height: 200px; }
        .slot-container { border: 1px dashed #cbd5e1; padding: 8px; border-radius: 6px; position: relative; }
        .remove-btn { color: #f87171; font-size: 10px; font-weight: bold; position: absolute; right: 5px; top: 2px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white p-6 shadow-md border border-slate-300">
        
        <div class="flex justify-between items-center mb-8 pb-4 border-b-2 border-slate-100">
            <div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Full Content Editor</h1>
                <p class="text-xs text-blue-600 font-bold uppercase tracking-widest">Add or Remove Series and Schedule Slots</p>
            </div>
            <button onclick="saveAll()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded font-black transition shadow-lg uppercase text-sm">
                Save All Changes
            </button>
        </div>

        <div class="mb-12">
            <h2 class="text-sm font-black text-slate-800 mb-4 uppercase border-l-4 border-blue-600 pl-2">1. Series Inventory</h2>
            <table class="w-full border-collapse cell-border" id="inventoryTable">
                <thead>
                    <tr class="table-header text-slate-800 uppercase">
                        <th class="cell-border px-4 py-2 text-left w-1/3">Series Title</th>
                        <th class="cell-border px-4 py-2 text-center">Total</th>
                        <th class="cell-border px-4 py-2 text-center">Available</th>
                        <th class="cell-border px-4 py-2 text-right">Until Date</th>
                        <th class="cell-border px-4 py-2 w-10"></th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="hover:bg-slate-50">
                        <td class="p-2 cell-border"><input type="text" value="POPEYE CLASSIC" class="input-box font-bold uppercase"></td>
                        <td class="p-2 cell-border"><input type="number" value="40" class="input-box text-center font-bold"></td>
                        <td class="p-2 cell-border"><input type="number" value="25" class="input-box text-center font-bold"></td>
                        <td class="p-2 cell-border"><input type="text" value="August 29, 2026" class="input-box text-right font-bold"></td>
                        <td class="p-2 cell-border text-center"><button class="text-red-400 font-bold" onclick="this.parentElement.parentElement.remove()">✖</button></td>
                    </tr>
                </tbody>
            </table>
            <button onclick="addRow()" class="mt-3 text-blue-600 font-black text-[11px] uppercase tracking-widest hover:underline">+ Add New Series</button>
        </div>

        <div>
            <h2 class="text-sm font-black text-slate-800 mb-4 uppercase border-l-4 border-slate-800 pl-2">2. Dynamic Weekly Schedule</h2>
            <div class="border-2 border-black">
                <div class="grid grid-cols-5 bg-slate-50 text-[11px] font-black uppercase text-center border-b-2 border-black">
                    <div class="p-2 border-r border-slate-300">Monday</div>
                    <div class="p-2 border-r border-slate-300">Tue / Thu</div>
                    <div class="p-2 border-r border-slate-300">Wednesday</div>
                    <div class="p-2 border-r border-slate-300">Saturday</div>
                    <div class="p-2">Sunday</div>
                </div>

                <div class="grid grid-cols-5 min-h-[300px]" id="scheduleGrid">
                    <div class="day-column p-2 space-y-3 bg-blue-50/30" id="mon-col">
                        <div class="slot-container">
                            <button class="remove-btn" onclick="this.parentElement.remove()">REMOVE</button>
                            <input type="text" value="WYATT EARP S2" class="input-box font-bold mb-1 uppercase">
                            <input type="text" value="01:00AM - 01:30AM" class="input-box text-[10px] text-slate-400">
                        </div>
                        <button onclick="addSlot('mon-col')" class="w-full py-1 border border-blue-300 text-[10px] font-bold text-blue-600 rounded bg-white hover:bg-blue-50">+ ADD SLOT</button>
                    </div>

                    <div class="day-column p-2 space-y-3" id="tue-col">
                        <div class="slot-container">
                            <button class="remove-btn" onclick="this.parentElement.remove()">REMOVE</button>
                            <input type="text" value="THE LONE RANGER" class="input-box font-bold mb-1 uppercase">
                            <input type="text" value="02:00PM - 02:30PM" class="input-box text-[10px] text-slate-400">
                        </div>
                        <button onclick="addSlot('tue-col')" class="w-full py-1 border border-slate-300 text-[10px] font-bold text-slate-400 rounded bg-white hover:bg-slate-50">+ ADD SLOT</button>
                    </div>

                    <div class="day-column p-2 space-y-3 bg-blue-50/30" id="wed-col">
                        <div class="slot-container">
                            <button class="remove-btn" onclick="this.parentElement.remove()">REMOVE</button>
                            <input type="text" value="WYATT EARP S2" class="input-box font-bold mb-1 uppercase">
                            <input type="text" value="01:00AM - 01:30AM" class="input-box text-[10px] text-slate-400">
                        </div>
                        <button onclick="addSlot('wed-col')" class="w-full py-1 border border-blue-300 text-[10px] font-bold text-blue-600 rounded bg-white hover:bg-blue-50">+ ADD SLOT</button>
                    </div>

                    <div class="day-column p-2 space-y-3" id="sat-col">
                        <div class="slot-container">
                            <button class="remove-btn" onclick="this.parentElement.remove()">REMOVE</button>
                            <input type="text" value="POPEYE CLASSIC" class="input-box font-bold mb-1 uppercase">
                            <input type="text" value="04:00PM - 04:30PM" class="input-box text-[10px] text-slate-400">
                        </div>
                        <button onclick="addSlot('sat-col')" class="w-full py-1 border border-slate-300 text-[10px] font-bold text-slate-400 rounded bg-white hover:bg-slate-50">+ ADD SLOT</button>
                    </div>

                    <div class="day-column p-2 space-y-3 bg-slate-50 border-r-0" id="sun-col">
                        <div class="slot-container bg-white shadow-sm border-blue-200">
                            <button class="remove-btn" onclick="this.parentElement.remove()">REMOVE</button>
                            <input type="text" value="WHAT'S MY LINE" class="input-box font-black mb-1 uppercase text-blue-700">
                            <input type="text" value="02:00PM - 03:00PM" class="input-box text-[10px] text-slate-400">
                        </div>
                        <button onclick="addSlot('sun-col')" class="w-full py-1 border border-slate-300 text-[10px] font-bold text-slate-400 rounded bg-white hover:bg-slate-50">+ ADD SLOT</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-200 flex justify-end">
             <button onclick="saveAll()" class="bg-slate-900 text-white px-12 py-4 rounded font-black uppercase tracking-widest hover:bg-black transition shadow-xl">
                Finalize & Sync Dashboard
            </button>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-3 rounded-full shadow-2xl font-bold animate-bounce">
        ✓ CHANGES SYNCED TO MASTER DASHBOARD
    </div>

    <script>
        function addRow() {
            const table = document.getElementById("inventoryTable").getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            newRow.className = "hover:bg-slate-50";
            newRow.innerHTML = `
                <td class="p-2 cell-border"><input type="text" placeholder="SERIES TITLE" class="input-box font-bold uppercase"></td>
                <td class="p-2 cell-border"><input type="number" placeholder="0" class="input-box text-center font-bold"></td>
                <td class="p-2 cell-border"><input type="number" placeholder="0" class="input-box text-center font-bold"></td>
                <td class="p-2 cell-border"><input type="text" placeholder="Date, 2026" class="input-box text-right font-bold"></td>
                <td class="p-2 cell-border text-center"><button class="text-red-400 font-bold" onclick="this.parentElement.parentElement.remove()">✖</button></td>
            `;
        }

        function addSlot(dayId) {
            const dayCol = document.getElementById(dayId);
            const addBtn = dayCol.lastElementChild;
            const newSlot = document.createElement('div');
            newSlot.className = "slot-container bg-white";
            newSlot.innerHTML = `
                <button class="remove-btn" onclick="this.parentElement.remove()">REMOVE</button>
                <input type="text" placeholder="SHOW TITLE" class="input-box font-bold mb-1 uppercase">
                <input type="text" placeholder="TIME SLOT" class="input-box text-[10px] text-slate-400">
            `;
            dayCol.insertBefore(newSlot, addBtn);
        }

        function saveAll() {
            const toast = document.getElementById("toast");
            toast.classList.remove("hidden");
            setTimeout(() => { toast.classList.add("hidden"); }, 3000);
        }
    </script>
</body>
</html>
