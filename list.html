<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setlist | EternaCloud</title>
    <link rel="stylesheet" href="style.css?v=final">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .list-container {
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .list-header {
            margin-bottom: 40px;
            border-left: 4px solid var(--accent-purple);
            padding-left: 20px;
        }

        .list-header h2 {
            margin: 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .song-row {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .song-row:hover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.08);
            transform: translateX(10px);
            box-shadow: -10px 0 20px rgba(139, 92, 246, 0.1);
        }

        .song-info {
            display: flex;
            flex-direction: column;
        }

        .song-title {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            text-transform: uppercase;
        }

        .song-meta {
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-top: 4px;
            font-weight: 600;
        }

        .song-date {
            color: #475569;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 20px;
            transition: color 0.2s;
        }

        .back-btn:hover { color: var(--accent-purple); }
    </style>
</head>
<body>
    <div style="position: fixed; bottom: -10%; left: -10%; width: 500px; height: 500px; background: rgba(59, 130, 246, 0.05); filter: blur(100px); pointer-events: none;"></div>

    <div class="list-container">
        <a href="dashboard.html" class="back-btn">← BACK TO DATABASE</a>
        
        <div class="list-header">
            <h2 id="episode-title">LOADING NODE...</h2>
        </div>

        <div id="song-list">
            </div>
    </div>

    <script>
        async function loadEpisode() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) return;

            try {
                const res = await fetch(`data/${id}.txt?t=${Date.now()}`);
                const text = await res.text();
                const lines = text.trim().split('\n');
                
                // Set the header from the filename or first line
                document.getElementById('episode-title').innerText = id.replace(/_/g, ' ');

                const listContainer = document.getElementById('song-list');
                listContainer.innerHTML = lines.map(line => {
                    const [title, artist, date] = line.split('|').map(s => s.trim());
                    return `
                        <div class="song-row">
                            <div class="song-info">
                                <span class="song-title">${title}</span>
                                <span class="song-meta">${artist || ''}</span>
                            </div>
                            <span class="song-date">${date || ''}</span>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error("Error loading episode data", e);
            }
        }
        loadEpisode();
    </script>
</body>
</html>
