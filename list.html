<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archive Node | EternaCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --accent: #8b5cf6;
            --panel-bg: rgba(15, 17, 26, 0.8);
            --border: rgba(139, 92, 246, 0.3);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.1), transparent 40%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* The Encasement Panel */
        .archive-encasement {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            width: 100%;
            max-width: 800px;
            padding: 50px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.05);
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-btn {
            color: #64748b;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .back-btn:hover { color: var(--accent); }

        .node-title {
            border-left: 4px solid var(--accent);
            padding-left: 20px;
            margin-bottom: 40px;
        }

        .node-title h2 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* The Clean Text List */
        .data-content {
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            color: #e2e8f0;
            white-space: pre-wrap; /* Keeps your text file formatting exactly as it is */
            font-size: 0.95rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 30px;
        }

        .status-tag {
            display: inline-block;
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 800;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="archive-encasement">
        <div class="nav-header">
            <a href="dashboard.html" class="back-btn">← TERMINAL</a>
            <span style="color:#64748b; font-size: 0.7rem; font-weight: bold;">NODE ACCESS: SECURE</span>
        </div>

        <div class="node-title">
            <span class="status-tag">VERIFIED ARCHIVE</span>
            <h2 id="display-title">JAN 07</h2>
        </div>

        <div id="text-data" class="data-content">LOADING DATA NODE...</div>
    </div>

    <script>
        async function fetchNode() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) return;

            document.getElementById('display-title').innerText = id.replace(/_/g, ' ').toUpperCase();

            try {
                const res = await fetch(`data/${id}.txt?t=${Date.now()}`);
                const text = await res.text();
                // We display the text exactly as it is in your file
                document.getElementById('text-data').innerText = text.trim();
            } catch (e) {
                document.getElementById('text-data').innerText = "ERROR: Could not retrieve data node.";
            }
        }
        fetchNode();
    </script>
</body>
</html>
