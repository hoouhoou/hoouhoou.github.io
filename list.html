<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setlist | EternaCloud</title>
    <link rel="stylesheet" href="style.css?v=final">
    <style>
        .list-container { padding: 40px; max-width: 900px; margin: 0 auto; }
        .list-header { margin-bottom: 40px; border-left: 4px solid var(--accent-purple); padding-left: 20px; }
        .list-header h2 { margin: 0; font-size: 1.8rem; text-transform: uppercase; color: #fff; }
        .song-row {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .song-row:hover { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.08); transform: translateX(10px); }
        .song-title { font-weight: 700; color: #fff; text-transform: uppercase; font-size: 0.95rem; }
        .song-meta { font-size: 0.75rem; color: var(--accent-blue); margin-top: 4px; font-weight: 600; }
        .song-date { color: #475569; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="list-container">
        <a href="dashboard.html" style="color: var(--accent-purple); text-decoration: none; font-size: 0.8rem; font-weight: bold;">← BACK TO DATABASE</a>
        <div class="list-header"><h2 id="epTitle">SETLIST NODE</h2></div>
        <div id="song-list"></div>
    </div>
    <script>
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            document.getElementById('epTitle').innerText = id.replace(/_/g, ' ');
            const res = await fetch(`data/${id}.txt?t=${Date.now()}`);
            const text = await res.text();
            document.getElementById('song-list').innerHTML = text.trim().split('\n').map(line => {
                const [title, artist, date] = line.split('|').map(s => s.trim());
                return `<div class="song-row"><div><div class="song-title">${title}</div><div class="song-meta">${artist || ''}</div></div><div class="song-date">${date || ''}</div></div>`;
            }).join('');
        }
        load();
    </script>
</body>
</html>
