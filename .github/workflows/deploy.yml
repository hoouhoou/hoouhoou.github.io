name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Note: checkout@v4 currently runs on Node.js 20.
        # A v5 or v6 release with Node.js 24 support is expected soon.
        # If this warning persists, check for newer versions at:
        # https://github.com/actions/checkout/releases

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Setup-node@v4 also runs on Node.js 20.
        # Watch for v5 release: https://github.com/actions/setup-node/releases

      - name: Build with secrets
        run: node build.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
