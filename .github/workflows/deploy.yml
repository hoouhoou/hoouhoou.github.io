name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build layout assets with secure variables
        run: |
          if [ -d "book-archive" ]; then
            cd book-archive
            node build.js
          else
            node build.js
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Stage build artifact distribution
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/book-archive/dist/
          if-no-files-found: warn

      # Fallback step in case files are in the absolute root context
      - name: Fallback Stage if not nested
        if: failure() || success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/
          if-no-files-found: ignore

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static assets to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
