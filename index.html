<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fiesta Archive</title>
    <style>
        body {
            background: url('fiesta-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(10px);
            border: 3px solid #f1c40f;
        }
        .login-card h2 { color: #e74c3c; font-size: 2rem; margin-bottom: 30px; font-weight: 900; text-transform: uppercase; }
        input[type="password"] { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; text-align: center; }
        .login-btn { width: 100%; padding: 15px; background: #2980b9; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #e67e22; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>FIESTA ARCHIVE</h2>
        <input type="password" id="passInput" placeholder="ENTER ACCESS KEY">
        <button class="login-btn" onclick="checkAuth()">JOIN THE FIESTA</button>
    </div>
    <script>
        function checkAuth() {
            if(document.getElementById('passInput').value === 'rj2026') {
                sessionStorage.setItem('isAuth', 'true');
                window.location.href = 'dashboard.html';
            } else { alert('Invalid Key'); }
        }
    </script>
</body>
</html>
