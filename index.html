<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fiesta Archive</title>
    <style>
        body {
            /* Replace 'fiesta-bg.jpg' with your actual image filename */
            background: url('fiesta-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(8px);
            border: 4px solid #f1c40f; /* Yellow border */
        }

        .login-card h2 {
            color: #e67e22; /* Vibrant Orange */
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: #e67e22;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: #d35400;
            transform: scale(1.02);
        }

        .error-msg {
            color: #c0392b;
            font-weight: bold;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>FIESTA ARCHIVE</h2>
        <input type="password" id="passInput" placeholder="ENTER ACCESS KEY">
        <button class="login-btn" onclick="checkAuth()">JOIN THE FIESTA</button>
        <p id="errorBox" class="error-msg">INVALID KEY</p>
    </div>

    <script>
        function checkAuth() {
            const pass = document.getElementById('passInput').value;
            const errorBox = document.getElementById('errorBox');
            
            // The password is set to rj2026
            if(pass === 'rj2026') {
                sessionStorage.setItem('isAuth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorBox.style.display = 'block';
                // Clear input if wrong
                document.getElementById('passInput').value = '';
            }
        }

        // Allow 'Enter' key to login
        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAuth();
            }
        });
    </script>
</body>
</html>
