<!DOCTYPE html>
<html lang="en" class="h-full bg-[#121212]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Archive – Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .transition-all-custom { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3e3e3e; }
    .book-row { transition: 0.15s; }
    .book-row:hover { background: #1e1e1e; }
    .admin-panel { display: none; }
    .admin-panel.open { display: block; }
    .category-active { background: #1e293b; color: white; }
  </style>
</head>
<body class="h-full text-zinc-200 font-sans flex flex-col antialiased selection:bg-emerald-500/30 selection:text-emerald-400 overflow-hidden">

  <!-- ===== TOP BAR ===== -->
  <header class="h-12 bg-[#171717] border-b border-zinc-800/80 flex items-center justify-between px-3 shrink-0 text-xs z-30">
    <div class="flex items-center space-x-2">
      <div class="text-[#3ecf8e] text-lg font-bold mr-2 flex items-center justify-center">
        <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current"><path d="M21.357 11.102a.5.5 0 0 0-.5-.102l-8.214 2.738L16.43 3.61a.5.5 0 0 0-.834-.465L2.643 12.898a.5.5 0 0 0 .5.102l8.214-2.738-3.786 10.13a.5.5 0 0 0 .834.466l12.956-9.753a.5.5 0 0 0 .1-.503z"/></svg>
      </div>
      <div class="flex items-center space-x-1.5 cursor-pointer hover:bg-zinc-800/60 px-2 py-1 rounded transition">
        <span class="w-4 h-4 rounded bg-zinc-700 flex items-center justify-center text-[9px] text-zinc-300 font-bold">Bo</span>
        <span class="font-normal text-zinc-200">BookArc</span>
        <span class="text-[9px] px-1 bg-zinc-800 text-zinc-400 border border-zinc-700/60 rounded font-semibold uppercase tracking-wider scale-90">Free</span>
        <i class="fa-solid fa-chevron-down text-[9px] text-zinc-500 ml-0.5"></i>
      </div>
      <span class="text-zinc-700 text-sm">/</span>
      <div class="flex items-center space-x-1.5 cursor-pointer hover:bg-zinc-800/60 px-2 py-1 rounded transition">
        <i class="fa-solid fa-cube text-zinc-400 text-[11px]"></i>
        <span class="font-normal text-zinc-200">my-archive</span>
        <i class="fa-solid fa-chevron-down text-[9px] text-zinc-500 ml-0.5"></i>
      </div>
      <span class="text-zinc-700 text-sm">/</span>
      <div class="flex items-center space-x-1.5 cursor-pointer hover:bg-zinc-800/60 px-2 py-1 rounded transition">
        <span class="font-mono text-zinc-300">main</span>
        <span class="text-[9px] px-1.5 py-0.5 bg-amber-500/10 text-amber-500 border border-amber-500/20 rounded font-medium uppercase tracking-wider scale-90">Production</span>
        <i class="fa-solid fa-chevron-down text-[9px] text-zinc-500 ml-0.5"></i>
      </div>
      <button id="admin-login-toggle" class="ml-2 bg-[#0d2d24] text-[#3ecf8e] border border-emerald-900/60 hover:border-emerald-700/80 px-2.5 py-1 rounded font-medium flex items-center space-x-1.5 transition">
        <i class="fa-solid fa-plug text-[10px]"></i>
        <span id="admin-status-label">Connect</span>
      </button>
    </div>

    <div class="flex items-center space-x-3 text-zinc-400">
      <span class="hover:text-zinc-200 text-xs cursor-pointer transition">Feedback</span>
      <div class="bg-[#1e1e1e] border border-zinc-800 rounded px-2 py-1 flex items-center justify-between w-40 cursor-pointer hover:border-zinc-700 transition">
        <div class="flex items-center space-x-1.5 text-zinc-500">
          <i class="fa-solid fa-magnifying-glass text-[10px]"></i>
          <input type="text" id="search-input" placeholder="Search books..." class="bg-transparent border-none outline-none text-zinc-200 w-full text-xs" />
        </div>
        <span class="text-[9px] bg-zinc-800 px-1 py-0.5 rounded text-zinc-500 font-mono">⌘K</span>
      </div>
      <div class="flex items-center space-x-3 text-sm text-zinc-400">
        <i class="fa-regular fa-circle-question hover:text-zinc-200 cursor-pointer transition"></i>
        <i class="fa-regular fa-lightbulb hover:text-zinc-200 cursor-pointer transition"></i>
        <i class="fa-regular fa-bell hover:text-zinc-200 cursor-pointer transition"></i>
      </div>
      <div class="w-6 h-6 rounded-full border border-zinc-700 overflow-hidden cursor-pointer">
        <div class="grid grid-cols-2 w-full h-full">
          <div class="bg-zinc-800"></div><div class="bg-emerald-600"></div>
          <div class="bg-emerald-500"></div><div class="bg-zinc-700"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== BODY ===== -->
  <div class="flex flex-1 overflow-hidden relative">

    <!-- ===== SIDEBAR ===== -->
    <div id="navigation-shell" class="flex shrink-0 transition-all-custom z-20 w-60 border-r border-zinc-800/80 bg-[#141414]">
      
      <!-- Tier 1: Icon bar -->
      <aside class="w-12 bg-[#171717] border-r border-zinc-800/80 flex flex-col justify-between py-2 items-center shrink-0">
        <div class="w-full flex flex-col items-center space-y-0.5">
          <button onclick="switchView('overview')" class="nav-icon-btn w-8 h-8 rounded-md flex items-center justify-center text-emerald-400 bg-zinc-800/80 border border-zinc-700/40" title="Project Overview"><i class="fa-solid fa-house-chimney text-xs"></i></button>
          <button onclick="switchView('categories')" class="nav-icon-btn w-8 h-8 rounded-md flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Categories"><i class="fa-solid fa-tags text-xs"></i></button>
          <button class="nav-icon-btn w-8 h-8 rounded-md flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Admin"><i class="fa-solid fa-plus text-xs" id="new-book-icon"></i></button>
          <div class="w-6 border-b border-zinc-800/60 my-1.5"></div>
          <button class="nav-icon-btn w-8 h-8 rounded-md flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Database"><i class="fa-solid fa-database text-xs"></i></button>
          <button class="nav-icon-btn w-8 h-8 rounded-md flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Authentication"><i class="fa-solid fa-user-shield text-xs"></i></button>
        </div>
        <div class="w-full flex flex-col items-center space-y-0.5">
          <button class="nav-icon-btn w-8 h-8 rounded-md flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Settings"><i class="fa-solid fa-gear text-xs"></i></button>
          <button id="toggle-sidebar" class="w-8 h-8 rounded-md flex items-center justify-center text-zinc-500 hover:text-zinc-200 transition">
            <i id="toggle-icon" class="fa-solid fa-bars-staggered text-xs"></i>
          </button>
        </div>
      </aside>

      <!-- Tier 2: Sub-sidebar (content) -->
      <aside id="sub-sidebar" class="flex-1 flex flex-col p-2.5 text-xs overflow-hidden">
        
        <!-- Overview Menu (default) -->
        <div id="menu-overview" class="flex flex-col h-full space-y-4">
          <div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Book Archive</div>
          <nav class="space-y-0.5">
            <a href="#" class="flex items-center space-x-2.5 px-2 py-1.5 rounded bg-zinc-800/80 text-white font-medium">
              <i class="fa-solid fa-house-chimney text-zinc-400 w-4 text-center"></i><span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-2.5 px-2 py-1.5 rounded text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/30 transition" onclick="setCategory('')">
              <i class="fa-solid fa-book-open text-zinc-500 w-4 text-center"></i><span>All Books</span>
            </a>
            <!-- Dynamic category list will be injected here -->
            <div id="category-list" class="space-y-0.5 mt-1"></div>
            <div class="border-b border-zinc-800/60 my-2 mx-1"></div>
            <a href="#" class="flex items-center space-x-2.5 px-2 py-1.5 rounded text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/30 transition" id="admin-sidebar-link">
              <i class="fa-solid fa-pen-to-square text-emerald-400 w-4 text-center"></i><span>Add Book</span>
            </a>
          </nav>
        </div>

        <!-- Categories Menu (hidden by default) -->
        <div id="menu-categories" class="flex flex-col h-full space-y-4 hidden">
          <div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Categories</div>
          <nav id="category-nav" class="space-y-0.5"></nav>
        </div>

        <!-- Admin/Upload panel (hidden) -->
        <div id="menu-admin" class="flex flex-col h-full space-y-4 hidden">
          <div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Admin</div>
          <div id="admin-upload-form" class="space-y-3 text-xs">
            <div id="admin-login-box">
              <input id="admin-email" type="email" placeholder="Email" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs" />
              <input id="admin-pass" type="password" placeholder="Password" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1" />
              <button id="admin-login-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-black font-semibold text-xs px-3 py-1.5 rounded transition mt-1">Login</button>
              <p class="text-zinc-500 text-[10px] mt-1">First time? Create user in Supabase Auth.</p>
            </div>
            <div id="admin-upload-fields" style="display:none;">
              <input id="book-title" placeholder="Title *" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs" />
              <input id="book-author" placeholder="Author" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1" />
              <select id="book-category" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1">
                <option value="">Select Category</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Science">Science</option>
                <option value="History">History</option>
                <option value="Technology">Technology</option>
                <option value="Philosophy">Philosophy</option>
                <option value="Biography">Biography</option>
                <option value="Other">Other</option>
              </select>
              <input id="book-isbn" placeholder="ISBN" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1" />
              <input id="book-year" placeholder="Year" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1" />
              <input id="book-format" placeholder="Format (PDF, EPUB...)" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1" />
              <input id="book-mirrors" placeholder="Mirror URLs (comma separated)" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1" />
              <textarea id="book-desc" placeholder="Description" class="w-full bg-[#1e1e1e] border border-zinc-700 rounded px-2 py-1.5 text-zinc-200 text-xs mt-1 resize-none h-16"></textarea>
              <button id="upload-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-black font-semibold text-xs px-3 py-1.5 rounded transition mt-2">➕ Add Book</button>
              <button id="logout-btn" class="w-full bg-zinc-700 hover:bg-zinc-600 text-zinc-200 text-xs px-3 py-1.5 rounded transition mt-1">Logout</button>
              <div id="admin-msg" class="text-xs mt-1 text-emerald-400"></div>
            </div>
          </div>
        </div>

        <!-- Settings menu placeholder -->
        <div id="menu-settings" class="flex flex-col h-full space-y-4 hidden overflow-y-auto">
          <div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Settings</div>
          <div class="text-zinc-500 text-xs">Project settings would go here.</div>
        </div>
      </aside>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="flex-1 bg-[#121212] overflow-y-auto p-6 md:p-8">
      
      <!-- Stats row -->
      <div class="flex flex-wrap items-center gap-4 mb-4 max-w-4xl">
        <div class="text-zinc-400 text-xs flex items-center gap-2">
          <i class="fa-solid fa-book"></i>
          <span id="total-count">0</span> books
        </div>
        <div class="text-zinc-400 text-xs flex items-center gap-2">
          <i class="fa-solid fa-tag"></i>
          <span id="category-label">All categories</span>
        </div>
        <button id="new-book-btn" class="ml-auto bg-emerald-600 hover:bg-emerald-700 text-black font-semibold text-xs px-3 py-1.5 rounded shadow-sm transition">
          <i class="fa-solid fa-plus mr-1"></i> New Book
        </button>
      </div>

      <!-- Book list -->
      <div id="book-list" class="space-y-1 max-w-4xl">
        <div class="text-zinc-500 text-center py-8 text-xs">Loading books...</div>
      </div>

    </main>
  </div>

  <script>
    // ======================== SUPABASE (INJECTED VIA BUILD) ========================
    const SUPABASE_URL = "{{SUPABASE_URL}}";
    const SUPABASE_ANON_KEY = "{{SUPABASE_ANON_KEY}}";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ======================== DOM REFS ========================
    const searchInput = document.getElementById('search-input');
    const bookList = document.getElementById('book-list');
    const totalCount = document.getElementById('total-count');
    const categoryLabel = document.getElementById('category-label');
    const categoryList = document.getElementById('category-list');
    const categoryNav = document.getElementById('category-nav');
    const newBookBtn = document.getElementById('new-book-btn');
    const adminToggleBtn = document.getElementById('admin-login-toggle');
    const adminStatusLabel = document.getElementById('admin-status-label');
    const adminLoginBox = document.getElementById('admin-login-box');
    const adminUploadFields = document.getElementById('admin-upload-fields');
    const adminEmail = document.getElementById('admin-email');
    const adminPass = document.getElementById('admin-pass');
    const adminLoginBtn = document.getElementById('admin-login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const adminMsg = document.getElementById('admin-msg');
    const newBookIcon = document.getElementById('new-book-icon');

    let currentCategory = '';
    let allCategories = [];
    let isAdminLoggedIn = false;

    // ======================== SIDEBAR TOGGLE ========================
    const toggleBtn = document.getElementById('toggle-sidebar');
    const navShell = document.getElementById('navigation-shell');
    const toggleIcon = document.getElementById('toggle-icon');
    let isCollapsed = false;
    toggleBtn.addEventListener('click', () => {
      isCollapsed = !isCollapsed;
      navShell.style.width = isCollapsed ? '48px' : '240px';
      toggleIcon.className = isCollapsed ? 'fa-solid fa-chevron-right' : 'fa-solid fa-bars-staggered';
    });

    // ======================== VIEW SWITCHER ========================
    function switchView(view) {
      const overview = document.getElementById('menu-overview');
      const categories = document.getElementById('menu-categories');
      const admin = document.getElementById('menu-admin');
      const settings = document.getElementById('menu-settings');
      const icons = document.querySelectorAll('.nav-icon-btn');
      icons.forEach(btn => btn.classList.remove('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40'));
      icons.forEach(btn => btn.classList.add('text-zinc-400', 'hover:text-zinc-200', 'hover:bg-zinc-800/40'));

      overview.classList.add('hidden');
      categories.classList.add('hidden');
      admin.classList.add('hidden');
      settings.classList.add('hidden');

      if (view === 'overview') {
        overview.classList.remove('hidden');
        icons[0].classList.add('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40');
      } else if (view === 'categories') {
        categories.classList.remove('hidden');
        icons[1].classList.add('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40');
        renderCategoryNav();
      } else if (view === 'admin') {
        admin.classList.remove('hidden');
        icons[2].classList.add('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40');
      } else if (view === 'settings') {
        settings.classList.remove('hidden');
        icons[icons.length-1].classList.add('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40');
      }
      if (isCollapsed) {
        isCollapsed = false;
        navShell.style.width = '240px';
        toggleIcon.className = 'fa-solid fa-bars-staggered';
      }
    }

    function setCategory(cat) {
      currentCategory = cat;
      categoryLabel.textContent = cat ? cat : 'All categories';
      document.querySelectorAll('#category-nav .category-item, #category-list .category-item').forEach(el => {
        el.classList.toggle('bg-zinc-800/80', el.dataset.category === cat);
        el.classList.toggle('text-white', el.dataset.category === cat);
        el.classList.toggle('text-zinc-400', el.dataset.category !== cat);
      });
      loadBooks(searchInput.value, cat);
      switchView('overview');
    }

    // ======================== LOAD BOOKS ========================
    async function loadBooks(query = '', category = '') {
      let supabaseQuery = supabase.from('books').select('*', { count: 'exact' });
      if (query.trim()) {
        supabaseQuery = supabaseQuery.textSearch('search_vector', query, { config: 'english', type: 'websearch' });
      }
      if (category) {
        supabaseQuery = supabaseQuery.eq('category', category);
      }
      const { data, error, count } = await supabaseQuery.order('publication_year', { ascending: false }).limit(100);
      if (error) {
        bookList.innerHTML = `<div class="text-zinc-500 text-center py-8 text-xs">⚠️ Error loading books</div>`;
        return;
      }
      totalCount.textContent = count || 0;
      if (!data || data.length === 0) {
        bookList.innerHTML = `<div class="text-zinc-500 text-center py-8 text-xs">No books found. Add your first one using "New Book".</div>`;
        return;
      }
      let html = '';
      data.forEach(book => {
        let mirrors = [];
        try { mirrors = JSON.parse(book.mirror_urls) || []; } catch { mirrors = [book.mirror_urls]; }
        if (!Array.isArray(mirrors)) mirrors = [mirrors];
        const valid = mirrors.filter(u => u && u.startsWith('http'));
        const badge = book.category ? `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-900/60 px-1.5 py-0.5 rounded text-[9px] font-medium">${book.category}</span>` : '';
        html += `
          <div class="book-row bg-[#171717] border border-zinc-800/80 rounded-lg p-3 flex flex-wrap items-center justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium text-zinc-200 truncate">${book.title}</div>
              <div class="flex flex-wrap items-center gap-1 text-xs text-zinc-400 mt-0.5">
                ${book.author ? `✍️ ${book.author}` : ''}
                ${badge}
                ${book.isbn ? `· ISBN ${book.isbn}` : ''}
                ${book.description ? `· ${book.description.substring(0, 40)}${book.description.length > 40 ? '…' : ''}` : ''}
              </div>
            </div>
            <div class="flex items-center gap-2 text-xs text-zinc-400 shrink-0">
              <span>${book.publication_year || 'N/A'}</span>
              ${book.file_format ? `<span class="bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-300">${book.file_format}</span>` : ''}
              ${valid.length ? `<a href="${valid[0]}" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-black px-2 py-0.5 rounded font-medium transition">Mirror</a>` : ''}
            </div>
          </div>
        `;
      });
      bookList.innerHTML = html;
      loadCategories();
    }

    // ======================== CATEGORIES ========================
    async function loadCategories() {
      const { data, error } = await supabase.from('books').select('category');
      if (error || !data) return;
      const cats = [...new Set(data.map(b => b.category).filter(Boolean))].sort();
      allCategories = cats;
      renderCategories(cats);
    }

    function renderCategories(cats) {
      const list = categoryList;
      const nav = categoryNav;
      let html = cats.map(c => `
        <a href="#" class="category-item flex items-center space-x-2.5 px-2 py-1.5 rounded text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/30 transition" data-category="${c}" onclick="setCategory('${c}')">
          <i class="fa-solid fa-tag text-zinc-500 w-4 text-center"></i><span>${c}</span>
        </a>
      `).join('');
      list.innerHTML = html;
      nav.innerHTML = `<div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Filter by</div>` + html;
    }

    function renderCategoryNav() {}

    // ======================== ADMIN AUTH ========================
    function updateAdminUI(user) {
      if (user) {
        adminLoginBox.style.display = 'none';
        adminUploadFields.style.display = 'block';
        adminStatusLabel.textContent = `✅ ${user.email}`;
        adminToggleBtn.classList.add('bg-emerald-900/30', 'border-emerald-700');
        isAdminLoggedIn = true;
      } else {
        adminLoginBox.style.display = 'block';
        adminUploadFields.style.display = 'none';
        adminStatusLabel.textContent = 'Connect';
        adminToggleBtn.classList.remove('bg-emerald-900/30', 'border-emerald-700');
        isAdminLoggedIn = false;
      }
      adminMsg.textContent = '';
    }

    supabase.auth.onAuthStateChange((event, session) => {
      updateAdminUI(session?.user || null);
    });
    supabase.auth.getSession().then(({ data }) => {
      updateAdminUI(data.session?.user || null);
    });

    adminLoginBtn.addEventListener('click', async () => {
      const email = adminEmail.value.trim();
      const pass = adminPass.value;
      const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) {
        adminMsg.textContent = '❌ ' + error.message;
        adminMsg.className = 'text-red-400 text-xs';
      } else {
        adminMsg.textContent = '✅ Login successful';
        adminMsg.className = 'text-emerald-400 text-xs';
      }
    });

    logoutBtn.addEventListener('click', () => {
      supabase.auth.signOut();
    });

    // ======================== UPLOAD BOOK ========================
    uploadBtn.addEventListener('click', async () => {
      const user = (await supabase.auth.getUser()).data.user;
      if (!user) {
        adminMsg.textContent = '❌ Please login first.';
        adminMsg.className = 'text-red-400 text-xs';
        return;
      }
      const title = document.getElementById('book-title').value.trim();
      if (!title) {
        adminMsg.textContent = '❌ Title is required.';
        adminMsg.className = 'text-red-400 text-xs';
        return;
      }
      const mirrorsRaw = document.getElementById('book-mirrors').value.trim();
      const mirror_urls = mirrorsRaw ? mirrorsRaw.split(',').map(s => s.trim()).filter(s => s) : [];
      const payload = {
        title,
        author: document.getElementById('book-author').value.trim() || null,
        category: document.getElementById('book-category').value || null,
        isbn: document.getElementById('book-isbn').value.trim() || null,
        publication_year: parseInt(document.getElementById('book-year').value) || null,
        file_format: document.getElementById('book-format').value.trim() || null,
        mirror_urls: mirror_urls.length ? mirror_urls : null,
        description: document.getElementById('book-desc').value.trim() || null,
      };
      const { error } = await supabase.from('books').insert(payload);
      if (error) {
        adminMsg.textContent = '❌ ' + error.message;
        adminMsg.className = 'text-red-400 text-xs';
      } else {
        adminMsg.textContent = '✅ Book added successfully!';
        adminMsg.className = 'text-emerald-400 text-xs';
        document.querySelectorAll('#admin-upload-fields input, #admin-upload-fields textarea, #admin-upload-fields select').forEach(el => el.value = '');
        loadBooks(searchInput.value, currentCategory);
        loadCategories();
      }
    });

    // ======================== EVENT BINDINGS ========================
    adminToggleBtn.addEventListener('click', () => { switchView('admin'); });
    newBookBtn.addEventListener('click', () => { switchView('admin'); });
    newBookIcon.addEventListener('click', () => { switchView('admin'); });
    searchInput.addEventListener('input', (e) => { loadBooks(e.target.value, currentCategory); });

    // ======================== INIT ========================
    loadBooks('', '');
    loadCategories();
  </script>
</body>
</html>
