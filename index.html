<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | EternaCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; background: #0a0c10; overflow: hidden;
            background-image: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
        }
        .glass-login {
            background: rgba(15, 17, 26, 0.8); border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 60px; border-radius: 40px; text-align: center; backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.1); width: 100%; max-width: 400px;
        }
        h2 { color: #fff; letter-spacing: 2px; margin-bottom: 5px; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; background: #1a1d24; color: #fff; text-align: center; outline: none; }
        .btn-login { width: 100%; padding: 15px; background: linear-gradient(90deg, #8b5cf6, #3b82f6); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4); }
    </style>
</head>
<body>
    <div class="glass-login">
        <h2>ETERNA<span style="font-weight:400; color:#64748b;">CLOUD</span></h2>
        <p>Secure Media Archive Access</p>
        <input type="password" id="pass" placeholder="Access Key">
        <button class="btn-login" onclick="validate()">INITIALIZE ACCESS</button>
    </div>
    <script>
        function validate() {
            if(document.getElementById('pass').value === 'rj2026') {
                sessionStorage.setItem('isAuth', 'true');
                window.location.href = 'dashboard.html';
            } else { alert('Invalid Key'); }
        }
    </script>
</body>
</html>
