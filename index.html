<!DOCTYPE html>
<html lang="en" class="h-full bg-[#121212]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault – Personal Archive</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="h-full text-zinc-100 flex flex-col justify-between selection:bg-emerald-500/30">

  <div id="auth-screen" class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-500/10 text-emerald-400 mb-4 border border-emerald-500/20">
        <i class="fa-solid fa-terminal text-xl"></i>
      </div>
      <h2 class="text-2xl font-bold tracking-tight text-white uppercase tracking-widest">Archive Core</h2>
      <p class="mt-1 text-xs text-zinc-500">Identity verification required for console access.</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-sm">
      <div class="bg-zinc-900/50 border border-zinc-800/80 rounded-2xl p-6 backdrop-blur-md">
        <form id="login-form" class="space-y-4">
          <div>
            <label for="email" class="block text-xs font-medium uppercase tracking-wider text-zinc-400">Archivist Identity</label>
            <input id="email" type="email" autocomplete="email" required class="mt-1.5 block w-full rounded-lg bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm text-white placeholder-zinc-600 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
          </div>
          <div>
            <label for="password" class="block text-xs font-medium uppercase tracking-wider text-zinc-400">Security Phrase</label>
            <input id="password" type="password" autocomplete="current-password" required class="mt-1.5 block w-full rounded-lg bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm text-white placeholder-zinc-600 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
          </div>
          <button type="submit" class="w-full flex justify-center rounded-lg bg-emerald-600 px-3 py-2.5 text-sm font-semibold text-white hover:bg-emerald-500 transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600">
            Verify Session
          </button>
        </form>
        <div id="auth-error" class="mt-4 text-xs bg-red-950/40 border border-red-900/50 text-red-400 p-3 rounded-lg hidden"></div>
      </div>
    </div>
  </div>

  <div id="dashboard-screen" class="hidden flex-1 flex flex-col min-h-screen">
    <header class="border-b border-zinc-800 bg-zinc-900/20 backdrop-blur-md px-6 py-4 flex items-center justify-between sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <span class="text-xl font-black tracking-widest text-white">VAULT</span>
        <span id="user-display" class="text-xs font-mono px-2 py-0.5 rounded bg-zinc-800 text-emerald-400 border border-zinc-700/50"></span>
      </div>
      <button id="logout-btn" class="text-xs font-medium px-3 py-1.5 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:bg-zinc-800 transition">
        Terminate Console
      </button>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-6 space-y-6">
      <section class="bg-zinc-900/30 border border-zinc-800/80 rounded-2xl p-5">
        <h3 class="text-sm font-bold uppercase tracking-wider text-zinc-300 mb-4 flex items-center gap-2">
          <i class="fa-solid fa-cloud-arrow-up text-emerald-400"></i> Document Ingest Pipeline
        </h3>
        <form id="upload-form" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div>
            <label for="doc-title" class="block text-xs font-medium text-zinc-400 uppercase tracking-wider">Index Title</label>
            <input type="text" id="doc-title" placeholder="e.g., Fiscal Ledger 2026" required class="mt-1.5 block w-full rounded-lg bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm text-white focus:border-emerald-500 focus:outline-none">
          </div>
          <div>
            <label for="doc-file" class="block text-xs font-medium text-zinc-400 uppercase tracking-wider">Target File Source</label>
            <input type="file" id="doc-file" required class="mt-1.5 block w-full text-sm text-zinc-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-zinc-200 hover:file:bg-zinc-700 file:cursor-pointer">
          </div>
          <button type="submit" id="upload-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-lg px-4 py-2 text-sm transition shadow-lg shadow-emerald-950/20">
            Commit Entry
          </button>
        </form>
        <div id="upload-status" class="mt-3 text-xs p-2.5 rounded-lg border hidden"></div>
      </section>

      <section class="space-y-4">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-zinc-500">
            <i class="fa-solid fa-magnifying-glass text-sm"></i>
          </span>
          <input type="text" id="search-input" placeholder="Query secure registry by title or literal file sequence..." class="block w-full rounded-xl bg-zinc-900/40 border border-zinc-800 pl-10 pr-4 py-3 text-sm text-white placeholder-zinc-500 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
        </div>

        <div class="bg-zinc-900/20 border border-zinc-800/80 rounded-2xl overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-zinc-800 bg-zinc-950/40 text-[11px] uppercase tracking-wider font-semibold text-zinc-400">
                  <th class="p-4">Archival Tracking Title</th>
                  <th class="p-4">System File Identification</th>
                  <th class="p-4">Registration Matrix</th>
                  <th class="p-4 text-right">Access Link</th>
                </tr>
              </thead>
              <tbody id="archive-table-body" class="divide-y divide-zinc-800/50 text-sm"></tbody>
            </table>
          </div>
          <div id="empty-state" class="p-12 text-center text-sm text-zinc-500 hidden">
            <i class="fa-solid fa-box-open block text-2xl mb-2 text-zinc-600"></i> No confirmed tracking coordinates identified in current database query.
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
