<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EternaCloud Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #3b82f6;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            /* Creates a soft tech-gradient background */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 58, 138, 0.1) 0px, transparent 50%);
            overflow: hidden;
        }

        .glass-login {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 50px 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: white;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-login:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        #error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="glass-login">
        <h2>ETERNA<span style="font-weight:400; color:#64748b;">CLOUD</span></h2>
        <p>Secure Media Archive Access</p>
        
        <input type="password" id="pass" placeholder="Access Key">
        <button class="btn-login" onclick="validate()">INITIALIZE ACCESS</button>
        <p id="error">Authentication Failed. Check key.</p>
    </div>

    <script>
        function validate() {
            const pass = document.getElementById('pass').value;
            // Kept your jesus christ password
            if(pass === 'jesus christ') {
                sessionStorage.setItem('isAuth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
