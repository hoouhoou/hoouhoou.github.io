<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Archive + Manual Category Upload</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #f8fafc; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 900px; width: 100%; }
    h1 { font-size: 2.5rem; margin-bottom: 0.2rem; }
    .sub { color: #475569; margin-bottom: 2rem; }
    .search-box { display: flex; gap: 10px; margin-bottom: 2rem; }
    .search-box input { flex: 1; padding: 14px 20px; border: 2px solid #e2e8f0; border-radius: 60px; font-size: 1.1rem; }
    .search-box input:focus { outline: none; border-color: #2563eb; }
    .search-box button { background: #2563eb; color: white; border: none; padding: 14px 30px; border-radius: 60px; font-weight: 600; cursor: pointer; }
    .search-box button:hover { background: #1d4ed8; }
    .results-grid { display: grid; gap: 16px; }
    .book-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; gap: 20px; border: 1px solid #e2e8f0; }
    .book-cover { width: 80px; height: 110px; background: #f1f5f9; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #94a3b8; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
    .book-info { flex: 1; }
    .book-info h3 { margin-bottom: 4px; }
    .book-info .meta { color: #475569; font-size: 0.9rem; margin-bottom: 6px; }
    .book-info .desc { color: #64748b; font-size: 0.95rem; margin: 8px 0; }
    .badge-cat { background: #dbeafe; color: #1e40af; padding: 2px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-right: 6px; }
    .mirror-btn { background: #22c55e; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 0.85rem; text-decoration: none; display: inline-block; margin-right: 4px; }
    .mirror-btn:hover { background: #16a34a; }
    .stats { margin-top: 1rem; color: #64748b; }
    .admin-toggle { margin: 2rem 0 1rem; display: flex; gap: 12px; align-items: center; }
    .admin-toggle button { background: #1e293b; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .admin-panel { background: white; padding: 24px; border-radius: 16px; border: 2px dashed #94a3b8; margin-bottom: 2rem; }
    .admin-panel h2 { margin-bottom: 1rem; font-size: 1.3rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid .full-width { grid-column: 1 / -1; }
    .admin-panel input, .admin-panel select, .admin-panel textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    .admin-panel textarea { resize: vertical; min-height: 60px; }
    .admin-panel button[type="submit"] { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; grid-column: 1 / -1; }
    .admin-panel .logout-btn { background: #ef4444; border: none; color: white; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
    .hidden { display: none !important; }
    .auth-error { color: #dc2626; font-size: 0.9rem; margin: 6px 0; }
    .success { color: #16a34a; }
  </style>
</head>
<body>
<div class="container">
  <h1>📚 Archive Search</h1>
  <p class="sub">Search by title, author, ISBN, or category.</p>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="search-input" placeholder="e.g. 'Dune', 'History', or '9780451524935'" />
    <button id="search-btn">🔍 Search</button>
  </div>
  <div id="results-container">
    <div class="results-grid" id="results-grid"></div>
    <div class="stats" id="stats"></div>
  </div>

  <!-- ADMIN TOGGLE -->
  <div class="admin-toggle">
    <button id="admin-toggle-btn">🔐 Admin Panel</button>
    <span id="admin-status" style="color:#64748b; font-size:0.9rem;">(Login to add books)</span>
  </div>

  <!-- ADMIN PANEL (Hidden by default) -->
  <div id="admin-panel" class="admin-panel hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>📝 Manually Upload Book by Category</h2>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
    <div id="admin-message" class="auth-error"></div>
    
    <!-- Login Form -->
    <div id="admin-login">
      <input id="admin-email" type="email" placeholder="Email" style="margin-bottom:8px;" />
      <input id="admin-pass" type="password" placeholder="Password" style="margin-bottom:8px;" />
      <button id="admin-login-btn" style="background:#2563eb; color:white; border:none; padding:10px; border-radius:40px; width:100%; font-weight:600; cursor:pointer;">Login to Admin</button>
      <p style="font-size:0.8rem; color:#64748b; margin-top:6px;">Sign up first if you don't have an account.</p>
    </div>

    <!-- Upload Form -->
    <div id="admin-upload" class="hidden">
      <div class="form-grid">
        <input id="book-title" placeholder="Title *" />
        <input id="book-author" placeholder="Author" />
        <select id="book-category">
          <option value="">-- Select Category --</option>
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Science">Science</option>
          <option value="History">History</option>
          <option value="Technology">Technology</option>
          <option value="Philosophy">Philosophy</option>
          <option value="Biography">Biography</option>
          <option value="Other">Other</option>
        </select>
        <input id="book-isbn" placeholder="ISBN" />
        <input id="book-year" placeholder="Year (e.g. 2020)" />
        <input id="book-format" placeholder="Format (e.g. PDF)" />
        <input id="book-size" placeholder="Size (MB)" />
        <input id="book-cover" placeholder="Cover Image URL" class="full-width" />
        <input id="book-mirrors" placeholder="Mirror URLs (comma separated)" class="full-width" />
        <textarea id="book-desc" placeholder="Description..." class="full-width"></textarea>
        <button id="upload-btn">➕ Add Book to Archive</button>
      </div>
    </div>
  </div>
</div>

<script>
  // 🔥 YOUR KEYS ARE NOW PRE-FILLED
  const SUPABASE_URL = "https://zbqsrfurmoowilpyxrfo.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpicXNyZnVybW9vd2lscHl4cmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODU3NjcsImV4cCI6MjA5Nzg2MTc2N30.Q58fAB5-KliFKo7v0g3e48I6ttgnYzyOom1FVsUOrFM";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ----- DOM refs -----
  const searchInput = document.getElementById('search-input');
  const searchBtn = document.getElementById('search-btn');
  const resultsGrid = document.getElementById('results-grid');
  const stats = document.getElementById('stats');
  const adminPanel = document.getElementById('admin-panel');
  const adminToggleBtn = document.getElementById('admin-toggle-btn');
  const adminStatus = document.getElementById('admin-status');
  const adminLogin = document.getElementById('admin-login');
  const adminUpload = document.getElementById('admin-upload');
  const adminEmail = document.getElementById('admin-email');
  const adminPass = document.getElementById('admin-pass');
  const adminLoginBtn = document.getElementById('admin-login-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const adminMessage = document.getElementById('admin-message');
  const uploadBtn = document.getElementById('upload-btn');

  // ----- Search -----
  async function performSearch(query) {
    if (!query.trim()) {
      resultsGrid.innerHTML = '<p style="color:#94a3b8; text-align:center; padding:2rem;">Type a title, author, or category.</p>';
      stats.textContent = '';
      return;
    }
    resultsGrid.innerHTML = '<p style="color:#94a3b8; text-align:center; padding:2rem;">Searching...</p>';
    const { data, error, count } = await supabase
      .from('books')
      .select('*', { count: 'exact' })
      .textSearch('search_vector', query, { config: 'english', type: 'websearch' })
      .order('publication_year', { ascending: false })
      .limit(50);

    if (error) { resultsGrid.innerHTML = `<p style="color:red;">Error</p>`; return; }
    if (!data.length) { resultsGrid.innerHTML = '<p style="color:#94a3b8; text-align:center; padding:2rem;">No books found.</p>'; stats.textContent = ''; return; }

    stats.textContent = `Found ${count} results.`;
    resultsGrid.innerHTML = data.map(book => {
      const coverHtml = book.cover_url ? `<img src="${book.cover_url}" />` : '📖';
      let mirrors = [];
      try { mirrors = JSON.parse(book.mirror_urls) || []; } catch { mirrors = [book.mirror_urls]; }
      if (!Array.isArray(mirrors)) mirrors = [mirrors];
      const validMirrors = mirrors.filter(u => u && u.startsWith('http'));

      return `
        <div class="book-card">
          <div class="book-cover">${coverHtml}</div>
          <div class="book-info">
            <h3>${book.title}</h3>
            <div class="meta">
              ${book.author ? `✍️ ${book.author}` : ''} 
              ${book.category ? `<span class="badge-cat">📂 ${book.category}</span>` : ''}
              ${book.publication_year ? `· ${book.publication_year}` : ''}
            </div>
            <div class="meta">
              ${book.file_format ? `<span class="badge">${book.file_format}</span>` : ''}
              ${book.file_size_mb ? `${book.file_size_mb} MB` : ''}
              ${book.isbn ? `ISBN: ${book.isbn}` : ''}
            </div>
            ${book.description ? `<div class="desc">${book.description.substring(0, 120)}...</div>` : ''}
            <div>
              ${validMirrors.length ? validMirrors.map(u => `<a href="${u}" target="_blank" class="mirror-btn">⬇️ Mirror</a>`).join('') : '<span style="color:#94a3b8;">No mirrors</span>'}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  searchBtn.addEventListener('click', () => performSearch(searchInput.value));
  searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(searchInput.value); });
  performSearch('');

  // ----- Admin Auth -----
  function updateAdminUI(user) {
    if (user) {
      adminLogin.classList.add('hidden');
      adminUpload.classList.remove('hidden');
      adminStatus.textContent = `✅ Logged in as ${user.email}`;
      adminMessage.textContent = '';
      adminMessage.className = 'auth-error';
    } else {
      adminLogin.classList.remove('hidden');
      adminUpload.classList.add('hidden');
      adminStatus.textContent = '(Login to add books)';
      adminMessage.textContent = '';
    }
  }

  supabase.auth.onAuthStateChange((event, session) => {
    updateAdminUI(session?.user || null);
  });

  supabase.auth.getSession().then(({ data }) => {
    updateAdminUI(data.session?.user || null);
  });

  adminToggleBtn.addEventListener('click', () => {
    adminPanel.classList.toggle('hidden');
  });

  adminLoginBtn.addEventListener('click', async () => {
    adminMessage.textContent = '';
    const email = adminEmail.value.trim();
    const pass = adminPass.value;
    const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) {
      adminMessage.textContent = error.message;
      adminMessage.className = 'auth-error';
    } else {
      adminMessage.textContent = '✅ Login successful!';
      adminMessage.className = 'success';
    }
  });

  logoutBtn.addEventListener('click', () => supabase.auth.signOut());

  // ----- Manual Upload -----
  uploadBtn.addEventListener('click', async () => {
    const user = (await supabase.auth.getUser()).data.user;
    if (!user) {
      adminMessage.textContent = 'Please login first.';
      adminMessage.className = 'auth-error';
      return;
    }

    const title = document.getElementById('book-title').value.trim();
    if (!title) {
      adminMessage.textContent = 'Title is required.';
      adminMessage.className = 'auth-error';
      return;
    }

    const mirrorsRaw = document.getElementById('book-mirrors').value.trim();
    const mirror_urls = mirrorsRaw ? mirrorsRaw.split(',').map(s => s.trim()).filter(s => s) : [];

    const payload = {
      title,
      author: document.getElementById('book-author').value.trim() || null,
      category: document.getElementById('book-category').value || null,
      isbn: document.getElementById('book-isbn').value.trim() || null,
      publication_year: parseInt(document.getElementById('book-year').value) || null,
      file_format: document.getElementById('book-format').value.trim() || null,
      file_size_mb: parseFloat(document.getElementById('book-size').value) || null,
      cover_url: document.getElementById('book-cover').value.trim() || null,
      mirror_urls: mirror_urls.length ? mirror_urls : null,
      description: document.getElementById('book-desc').value.trim() || null,
    };

    const { error } = await supabase.from('books').insert(payload);
    if (error) {
      adminMessage.textContent = '❌ Upload failed: ' + error.message;
      adminMessage.className = 'auth-error';
    } else {
      adminMessage.textContent = '✅ Book added successfully!';
      adminMessage.className = 'success';
      // Clear fields
      document.querySelectorAll('#admin-upload input, #admin-upload textarea, #admin-upload select').forEach(el => el.value = '');
      if (searchInput.value.trim()) performSearch(searchInput.value);
    }
  });
</script>
</body>
</html>
