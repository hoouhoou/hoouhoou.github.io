<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#1c1c1c] text-[#ededed] min-h-screen flex antialiased font-sans relative w-full overflow-x-hidden">

  <div id="toast-container" class="fixed bottom-5 right-5 z-50 max-w-md hidden">
    <div id="toast-card" class="border rounded-lg p-4 shadow-2xl flex gap-3 text-sm">
      <span id="toast-icon">🚨</span>
      <div class="flex flex-col gap-1">
        <div id="toast-title" class="font-semibold text-zinc-200 font-mono text-xs">Title</div>
        <div id="toast-msg" class="text-zinc-400 font-mono text-[11px] leading-relaxed">Message detail...</div>
      </div>
      <button onclick="hideToast()" class="text-zinc-500 hover:text-zinc-300 ml-auto text-xs font-bold cursor-pointer px-1">✕</button>
    </div>
  </div>

  <nav id="sidebar" class="fixed inset-y-0 left-0 w-64 md:w-14 bg-[#141414] border-r border-[#242424] flex flex-col items-center py-3 justify-between z-50 -translate-x-full md:translate-x-0 transition-transform duration-200 shrink-0">
    <div class="flex flex-col items-center gap-5 w-full">
      <div class="w-full flex items-center justify-between md:justify-center px-4 md:px-0">
        <div class="w-7 h-7 bg-[#242424] rounded-md flex items-center justify-center text-emerald-500 font-bold text-sm border border-[#2e2e2e]">⚡</div>
        <button onclick="toggleMobileMenu()" class="md:hidden text-zinc-400 hover:text-zinc-200 text-lg cursor-pointer">✕</button>
      </div>
      <div class="w-full h-[1px] bg-[#242424] px-2"></div>
      <div class="w-full px-3 md:px-0 flex flex-col items-center gap-2">
        <button class="w-full md:w-9 h-9 rounded-md flex items-center justify-start md:justify-center gap-3 px-3 md:px-0 text-emerald-400 bg-[#242424] border border-[#2e2e2e] text-base cursor-pointer">
          <span>📁</span>
          <span class="md:hidden text-xs font-medium text-zinc-300">Archive Files</span>
        </button>
      </div>
    </div>
    <div class="w-full px-4 md:px-0 flex items-center justify-start md:justify-center gap-3">
      <div class="w-7 h-7 bg-zinc-800 rounded-full flex items-center justify-center text-[10px] font-bold text-zinc-300 border border-[#2e2e2e] shrink-0">RJ</div>
      <span class="md:hidden text-xs font-medium text-zinc-400">Archivist Portal</span>
    </div>
  </nav>

  <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity"></div>

  <div class="flex-1 flex flex-col min-w-0 md:ml-14">
    <header class="h-12 bg-[#141414] border-b border-[#242424] px-4 md:px-6 flex items-center justify-between text-xs font-medium text-zinc-400 shrink-0">
      <div class="flex items-center gap-2">
        <button onclick="toggleMobileMenu()" class="md:hidden p-1.5 rounded-md hover:bg-zinc-800 text-zinc-300 mr-1 cursor-pointer">☰</button>
        <span>⚡ HoU</span>
        <span>/</span>
        <span class="text-zinc-200 font-semibold">Projects</span>
      </div>
    </header>

    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
      <div class="max-w-6xl mx-auto flex flex-col gap-6 md:gap-8">
        <h1 class="text-xl md:text-2xl font-semibold tracking-tight text-white">Projects</h1>

        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 flex-1 max-w-3xl">
            <input 
              type="text" 
              id="search-input"
              placeholder="Search for a project" 
              oninput="fetchItems()"
              class="bg-[#141414] border border-[#242424] text-xs rounded-md px-3 py-1.5 w-full sm:w-64 text-zinc-200 focus:outline-none focus:border-emerald-500 placeholder-zinc-600"
            />
            
            <div class="grid grid-cols-2 gap-2 sm:flex sm:items-center">
              <select id="venue-filter" onchange="fetchItems()" class="bg-[#141414] border border-[#242424] text-xs rounded-md px-3 py-1.5 text-zinc-300 focus:outline-none focus:border-emerald-500 cursor-pointer w-full">
                <option value="">All Venues</option>
                <option value="RJ Bistro Dusit Hotel">RJ Bistro Dusit Hotel</option>
                <option value="Mandarin Hotel">Mandarin Hotel</option>
                <option value="One Shangri-La">One Shangri-La</option>
              </select>

              <select id="media-filter" onchange="fetchItems()" class="bg-[#141414] border border-[#242424] text-xs rounded-md px-3 py-1.5 text-zinc-300 focus:outline-none focus:border-emerald-500 cursor-pointer w-full">
                <option value="">All Formats</option>
                <option value="video">📺 Video Tracks</option>
                <option value="audio">🎵 Audio Recordings</option>
              </select>
            </div>
          </div>

          <button onclick="handleAddRecord()" class="bg-[#3ecf8e] hover:bg-[#34b279] text-[#121212] font-semibold text-xs px-3 py-1.5 rounded-md flex items-center gap-1 transition-colors whitespace-nowrap self-start lg:self-auto cursor-pointer">
            <span class="text-sm font-bold">+</span> Add Record
          </button>
        </div>

        <div id="grid-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          </div>

      </div>
    </main>
  </div>

  <script>
    // Database access initialization vectors
    const SUPABASE_URL = "https://lmggzgvvtzeuukcuxlma.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_qKRhgtfA3v0euD5-XsDs3g_6ZcAas5Phere";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let mobileMenuOpen = false;

    // Toast alert handlers
    function showToast(title, msg, isError = true) {
      const container = document.getElementById('toast-container');
      const card = document.getElementById('toast-card');
      document.getElementById('toast-icon').innerText = isError ? '🚨' : '⚡';
      document.getElementById('toast-title').innerText = title;
      document.getElementById('toast-msg').innerText = msg;

      if (isError) {
        card.className = "bg-[#181111] border-[#f87171]/30 border rounded-lg p-4 shadow-2xl flex gap-3 text-sm";
      } else {
        card.className = "bg-[#111813] border-[#3ecf8e]/30 border rounded-lg p-4 shadow-2xl flex gap-3 text-sm";
      }
      container.classList.remove('hidden');
    }

    function hideToast() {
      document.getElementById('toast-container').classList.add('hidden');
    }

    // Fixed Responsive Sidebar Engine
    function toggleMobileMenu() {
      mobileMenuOpen = !mobileMenuOpen;
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      
      if (mobileMenuOpen) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
      } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      }
    }

    // Dynamic database querying engine
    async function fetchItems() {
      const grid = document.getElementById('grid-container');
      grid.innerHTML = `
        <div class="col-span-full border border-dashed border-[#2e2e2e] rounded-lg p-12 bg-[#141414] text-center text-xs text-zinc-500 font-mono animate-pulse">
          Querying archive metadata server vectors...
        </div>
      `;

      try {
        const searchVal = document.getElementById('search-input').value.trim();
        const venueVal = document.getElementById('venue-filter').value;
        const mediaVal = document.getElementById('media-filter').value;

        let query = supabase.from('archive_items').select('*');

        if (searchVal) {
          query = query.ilike('title', `%${searchVal}%`);
        }
        if (venueVal) {
          query = query.eq('venue', venueVal);
        }
        if (mediaVal) {
          query = query.eq('media_type', mediaVal);
        }

        const { data, error } = await query.order('created_at', { ascending: false });

        if (error) {
          showToast(`Database Error [${error.code || 'PGRST'}]`, error.message);
          grid.innerHTML = `
            <div class="col-span-full border border-dashed border-[#f87171]/20 rounded-lg p-12 bg-[#181111] text-center text-xs font-mono text-red-400">
              Failed to pull records. Check table layout definitions.
            </div>
          `;
          return;
        }

        if (!data || data.length === 0) {
          grid.innerHTML = `
            <div class="col-span-full border border-dashed border-[#2e2e2e] rounded-lg p-12 bg-[#141414] text-center text-xs font-mono text-zinc-500">
              No matching archive segments found.
            </div>
          `;
          return;
        }

        // Generating asset row displays
        grid.innerHTML = data.map(item => `
          <div class="bg-[#141414] border border-[#242424] hover:border-[#2e2e2e] rounded-lg p-5 flex flex-col justify-between h-40 transition-all group cursor-pointer">
            <div class="min-w-0">
              <div class="flex items-start justify-between gap-4 w-full">
                <h3 class="font-semibold text-white text-sm md:text-base group-hover:text-[#3ecf8e] transition-colors truncate max-w-[85%] font-mono">${item.title}</h3>
                <span class="text-zinc-600 text-sm">${item.media_type === 'video' ? '📺' : '🎵'}</span>
              </div>
              <p class="text-xs text-zinc-500 font-medium mt-1 truncate font-mono">
                ${item.venue || 'Unknown Location'} &nbsp;|&nbsp; ${item.original_broadcast_date || 'Undated'}
              </p>
            </div>
            <div class="flex items-center justify-between mt-4">
              <span class="bg-zinc-800 text-[10px] text-zinc-400 border border-[#2e2e2e] font-mono uppercase font-bold tracking-wider px-1.5 py-0.5 rounded">${item.media_type}</span>
              <span class="text-[11px] text-zinc-600 font-mono group-hover:text-zinc-400">id: ${item.id.substring(0, 8)}...</span>
            </div>
          </div>
        `).join('');

      } catch (err) {
        showToast("System Crash", err.message || "Failed to initialize request loop vectors.");
      }
    }

    // Handle database record insertions
    async function handleAddRecord() {
      const userTitle = prompt("Enter asset title:");
      if (!userTitle) return;

      const userVenue = prompt("Enter venue (e.g., RJ Bistro Dusit Hotel, Mandarin Hotel, One Shangri-La):", "RJ Bistro Dusit Hotel");
      const userType = prompt("Enter media format ('video' or 'audio'):", "video");
      const userDate = prompt("Enter recorded tracking date (MM-DD-YY):", "05-31-26");
      const filePath = prompt("Enter target file system storage path:", `archives/${userType}/${Date.now()}.mp4`);

      if (!filePath) {
        showToast("Constraint Violation", 'The "storage_file_path" string field cannot be blank.');
        return;
      }

      const { error } = await supabase
        .from('archive_items')
        .insert([
          { 
            title: userTitle, 
            creator: "RJ",
            media_type: userType === "audio" ? "audio" : "video",
            venue: userVenue,
            original_broadcast_date: userDate,
            storage_file_path: filePath
          }
        ]);

      if (error) {
        showToast(`Insertion Failed: ERROR ${error.code}`, error.message);
      } else {
        showToast("Success", "Asset descriptor successfully written to active tables.", false);
        fetchItems();
      }
    }

    // Initial sequence startup call
    window.addEventListener('DOMContentLoaded', fetchItems);
  </script>
</body>
</html>
