<!DOCTYPE html>
<html lang="en" class="h-full bg-[#121212]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Manager – Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .transition-all-custom { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3e3e3e; }
    .file-row { transition: 0.15s; }
    .file-row:hover { background: #1e1e1e; }

    #connect-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 6px;
      width: 360px;
      max-width: calc(100vw - 20px);
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      padding: 1.25rem;
      z-index: 100;
      color: #e2e8f0;
    }
    #connect-dropdown.open { display: block; }
    #connect-dropdown h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #f1f5f9;
    }
    #connect-dropdown input, #connect-dropdown select, #connect-dropdown textarea {
      width: 100%;
      padding: 8px 12px;
      background: #0d0d0d;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    #connect-dropdown input:focus, #connect-dropdown select:focus, #connect-dropdown textarea:focus {
      outline: none;
      border-color: #3ecf8e;
    }
    #connect-dropdown textarea { resize: vertical; min-height: 50px; }
    #connect-dropdown .btn-primary {
      width: 100%;
      background: #3ecf8e;
      color: #0b0e11;
      font-weight: 600;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }
    #connect-dropdown .btn-primary:hover { background: #2eb67d; }
    #connect-dropdown .btn-danger {
      width: 100%;
      background: #ef4444;
      color: white;
      font-weight: 600;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 4px;
    }
    #connect-dropdown .btn-danger:hover { background: #dc2626; }
    #connect-dropdown .msg { margin: 4px 0; font-size: 0.8rem; }
    #connect-dropdown .msg.error { color: #f87171; }
    #connect-dropdown .msg.success { color: #34d399; }
    #connect-dropdown .helper { font-size: 0.7rem; color: #6b7280; margin-top: 2px; }
    #connect-dropdown .close-dropdown {
      position: absolute;
      top: 6px;
      right: 10px;
      background: none;
      border: none;
      color: #6b7280;
      font-size: 1rem;
      cursor: pointer;
    }
    #connect-dropdown .close-dropdown:hover { color: #e2e8f0; }
    #connect-dropdown .tab-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      border-bottom: 1px solid #2e2e2e;
      padding-bottom: 8px;
      flex-wrap: wrap;
    }
    #connect-dropdown .tab-row button {
      background: none;
      border: none;
      color: #6b7280;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    #connect-dropdown .tab-row button:hover { color: #e2e8f0; background: #2e2e2e; }
    #connect-dropdown .tab-row button.active { color: #3ecf8e; background: #0d2d24; }
    #connect-dropdown .tab-content { display: none; }
    #connect-dropdown .tab-content.active { display: block; }

    .connect-wrapper { position: relative; display: inline-block; }

    #delete-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #delete-modal.active { display: flex; }
    #delete-modal .modal-box {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    #delete-modal .modal-box h3 { color: #f1f5f9; font-size: 1.1rem; margin-bottom: 8px; }
    #delete-modal .modal-box p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
    #delete-modal .modal-box .btn-row { display: flex; gap: 10px; }
    #delete-modal .modal-box .btn-row button { flex: 1; padding: 8px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    #delete-modal .modal-box .btn-row .cancel { background: #2e2e2e; color: #e2e8f0; }
    #delete-modal .modal-box .btn-row .cancel:hover { background: #3e3e3e; }
    #delete-modal .modal-box .btn-row .confirm { background: #ef4444; color: white; }
    #delete-modal .modal-box .btn-row .confirm:hover { background: #dc2626; }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 25;
    }
    #sidebar-overlay.active { display: block; }
    @media (min-width: 768px) {
      #sidebar-overlay, #sidebar-overlay.active { display: none !important; }
    }
    #navigation-shell {
      transition: transform 0.3s ease;
    }
    @media (max-width: 767px) {
      #navigation-shell {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        width: 260px;
        z-index: 30;
        background: #141414;
        border-right: 1px solid #2e2e2e;
      }
      #navigation-shell.open { transform: translateX(0); }
      #navigation-shell .w-14 { width: 100%; }
      #navigation-shell aside.w-14 { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; }
      #navigation-shell aside.w-14 > div { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; }
      #navigation-shell #sub-sidebar { display: none !important; }
    }
  </style>
</head>
<body class="h-full text-zinc-200 font-sans flex flex-col antialiased selection:bg-emerald-500/30 selection:text-emerald-400 overflow-hidden">

  <!-- TOP BAR -->
  <header class="h-14 bg-[#141414] border-b border-zinc-800 flex items-center justify-between px-3 sm:px-4 shrink-0 z-30">
    <div class="flex items-center space-x-2">
      <button id="mobile-menu-toggle" class="md:hidden text-zinc-400 hover:text-zinc-200 transition">
        <i class="fa-solid fa-bars text-lg"></i>
      </button>
      <div class="text-[#3ecf8e] text-xl font-bold flex items-center justify-center">
        <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M21.357 11.102a.5.5 0 0 0-.5-.102l-8.214 2.738L16.43 3.61a.5.5 0 0 0-.834-.465L2.643 12.898a.5.5 0 0 0 .5.102l8.214-2.738-3.786 10.13a.5.5 0 0 0 .834.466l12.956-9.753a.5.5 0 0 0 .1-.503z"/></svg>
      </div>
      <span class="text-zinc-300 font-semibold text-sm hidden sm:inline">File Manager</span>
    </div>

    <div class="flex items-center space-x-2 sm:space-x-4 flex-1 justify-end">
      <div class="bg-[#1e1e1e] border border-zinc-800 rounded-lg px-2 py-1 flex items-center w-32 sm:w-48 md:w-64 transition hover:border-zinc-700">
        <i class="fa-solid fa-magnifying-glass text-xs text-zinc-500 mr-1"></i>
        <input type="text" id="search-input" placeholder="Search files..." class="bg-transparent border-none outline-none text-zinc-200 w-full text-sm" />
        <span class="text-[10px] bg-zinc-800 px-1 py-0.5 rounded text-zinc-500 font-mono hidden sm:inline">⌘K</span>
      </div>

      <div class="connect-wrapper">
        <button id="admin-login-toggle" class="bg-[#10b981] hover:bg-[#059669] text-[#121212] px-3 sm:px-4 py-1.5 rounded-lg font-semibold text-xs sm:text-sm flex items-center space-x-1 sm:space-x-2 transition shadow-lg shadow-emerald-900/20 whitespace-nowrap">
          <i class="fa-solid fa-plug text-xs"></i>
          <span id="admin-status-label">Connect</span>
        </button>

        <div id="connect-dropdown">
          <button class="close-dropdown" id="dropdown-close">&times;</button>
          <h3 id="dropdown-title">Admin</h3>

          <div class="tab-row" id="tab-row" style="display:none;">
            <button class="active" data-tab="upload">Add File</button>
            <button data-tab="categories" id="categories-tab-btn" style="display:none;">Categories</button>
          </div>

          <div id="tab-upload" class="tab-content active">
            <div id="dropdown-login">
              <input id="admin-email" type="email" placeholder="Email" />
              <input id="admin-pass" type="password" placeholder="Password" />
              <button id="admin-login-btn" class="btn-primary">Login</button>
              <div class="helper">First time? Create user in Supabase Auth.</div>
              <div id="dropdown-msg" class="msg"></div>
            </div>

            <div id="dropdown-upload" style="display:none;">
              <input id="file-title" placeholder="File Name *" />
              <input id="file-author" placeholder="Author / Source" />
              <select id="file-category"><option value="">Select Category</option></select>
              <input id="file-format" placeholder="Format (PDF, Image, Video...)" />
              <input id="file-size" placeholder="Size (MB)" />
              <input id="file-urls" placeholder="File URLs (comma separated)" />
              <textarea id="file-desc" placeholder="Description"></textarea>
              <input type="hidden" id="edit-file-id" />
              <button id="upload-btn" class="btn-primary">➕ Add File</button>
              <button id="update-btn" class="btn-primary" style="display:none;">💾 Update File</button>
              <button id="logout-btn" class="btn-danger">Logout</button>
              <div id="dropdown-upload-msg" class="msg"></div>
            </div>
          </div>

          <div id="tab-categories" class="tab-content">
            <div style="display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;">
              <input id="new-category-input" placeholder="New category name..." style="flex:1; min-width:120px; margin:0;" />
              <button id="add-category-btn" class="btn-primary" style="width:auto; padding:8px 16px;">Add</button>
            </div>
            <div id="category-list-admin" class="space-y-1 text-sm"></div>
            <div id="category-msg" class="msg"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div id="sidebar-overlay"></div>

  <div class="flex flex-1 overflow-hidden relative">
    <!-- SIDEBAR -->
    <div id="navigation-shell" class="flex shrink-0 transition-all-custom z-20 w-14 border-r border-zinc-800 bg-[#141414]">
      <aside class="w-14 bg-[#141414] flex flex-col justify-between py-4 items-center shrink-0">
        <div class="w-full flex flex-col items-center space-y-4">
          <button onclick="switchView('overview')" class="nav-icon-btn w-10 h-10 rounded-xl flex items-center justify-center text-emerald-400 bg-zinc-800/80 border border-zinc-700/40" title="Dashboard">
            <i class="fa-solid fa-house-chimney text-base"></i>
          </button>
          <button onclick="switchView('categories')" class="nav-icon-btn w-10 h-10 rounded-xl flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Categories">
            <i class="fa-solid fa-tags text-base"></i>
          </button>
          <!-- ADD FILE icon – hidden for non-admins (we hide via JS) -->
          <button id="new-file-icon" class="nav-icon-btn w-10 h-10 rounded-xl flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Add File" style="display:none;">
            <i class="fa-solid fa-plus text-base"></i>
          </button>
          <div class="w-8 border-b border-zinc-800 my-1"></div>
          <button class="nav-icon-btn w-10 h-10 rounded-xl flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Database">
            <i class="fa-solid fa-database text-base"></i>
          </button>
        </div>
        <div class="w-full flex flex-col items-center space-y-4">
          <button class="nav-icon-btn w-10 h-10 rounded-xl flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/40 transition" title="Settings">
            <i class="fa-solid fa-gear text-base"></i>
          </button>
          <button id="toggle-sidebar" class="w-10 h-10 rounded-xl flex items-center justify-center text-zinc-500 hover:text-zinc-200 transition">
            <i id="toggle-icon" class="fa-solid fa-bars-staggered text-base"></i>
          </button>
        </div>
      </aside>

      <aside id="sub-sidebar" class="flex-1 flex flex-col p-2.5 text-xs overflow-hidden hidden">
        <div id="menu-overview" class="flex flex-col h-full space-y-4">
          <div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">File Manager</div>
          <nav class="space-y-0.5">
            <a href="#" class="flex items-center space-x-2.5 px-2 py-1.5 rounded bg-zinc-800/80 text-white font-medium">
              <i class="fa-solid fa-house-chimney text-zinc-400 w-4 text-center"></i><span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-2.5 px-2 py-1.5 rounded text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/30 transition" onclick="setCategory('')">
              <i class="fa-solid fa-folder-open text-zinc-500 w-4 text-center"></i><span>All Files</span>
            </a>
            <div id="category-list" class="space-y-0.5 mt-1"></div>
            <div class="border-b border-zinc-800/60 my-2 mx-1"></div>
            <!-- Add File link – hidden for non-admins -->
            <a href="#" class="flex items-center space-x-2.5 px-2 py-1.5 rounded text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/30 transition" id="admin-sidebar-link" style="display:none;">
              <i class="fa-solid fa-pen-to-square text-emerald-400 w-4 text-center"></i><span>Add File</span>
            </a>
            <!-- NEW: Sheets link – visible to all authenticated users -->
            <a href="sheets.html" class="flex items-center space-x-2.5 px-2 py-1.5 rounded text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/30 transition">
              <i class="fa-regular fa-file-spreadsheet text-emerald-400 w-4 text-center"></i><span>Sheets</span>
            </a>
          </nav>
        </div>
        <div id="menu-categories" class="flex flex-col h-full space-y-4 hidden">
          <div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Categories</div>
          <nav id="category-nav" class="space-y-0.5"></nav>
        </div>
        <div id="menu-settings" class="flex flex-col h-full space-y-4 hidden overflow-y-auto">
          <div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Settings</div>
          <div class="text-zinc-500 text-xs">Settings would go here.</div>
        </div>
      </aside>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 border-l border-zinc-800 relative bg-[#121212]">
      <main class="h-full overflow-y-auto p-3 sm:p-4 md:p-6">
        <div class="flex flex-wrap items-center gap-3 mb-4 max-w-4xl">
          <div class="text-zinc-400 text-xs flex items-center gap-2">
            <i class="fa-solid fa-file"></i>
            <span id="total-count">0</span> files
          </div>
          <div class="text-zinc-400 text-xs flex items-center gap-2">
            <i class="fa-solid fa-tag"></i>
            <span id="category-label">All categories</span>
          </div>
          <!-- New File button – hidden for non-admins -->
          <button id="new-file-btn" class="ml-auto bg-emerald-600 hover:bg-emerald-700 text-black font-semibold text-xs px-3 py-1.5 rounded shadow-sm transition" style="display:none;">
            <i class="fa-solid fa-plus mr-1"></i> New File
          </button>
        </div>

        <div id="file-list" class="space-y-1 max-w-4xl">
          <div class="text-zinc-500 text-center py-8 text-xs">Loading files...</div>
        </div>
      </main>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div id="delete-modal">
    <div class="modal-box">
      <h3>⚠️ Delete this file?</h3>
      <p id="delete-file-name">This action cannot be undone.</p>
      <div class="btn-row">
        <button class="cancel" id="delete-cancel">Cancel</button>
        <button class="confirm" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== SUPABASE ====================
    const SUPABASE_URL = "{{SUPABASE_URL}}";
    const SUPABASE_ANON_KEY = "{{SUPABASE_ANON_KEY}}";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== GLOBALS ====================
    window.currentUserRole = 'user';
    window.currentUserId = null;

    // ==================== DOM REFS ====================
    const searchInput = document.getElementById('search-input');
    const fileList = document.getElementById('file-list');
    const totalCount = document.getElementById('total-count');
    const categoryLabel = document.getElementById('category-label');
    const categoryList = document.getElementById('category-list');
    const categoryNav = document.getElementById('category-nav');
    const newFileBtn = document.getElementById('new-file-btn');
    const newFileIcon = document.getElementById('new-file-icon');
    const adminToggleBtn = document.getElementById('admin-login-toggle');
    const adminStatusLabel = document.getElementById('admin-status-label');
    const dropdown = document.getElementById('connect-dropdown');
    const dropdownClose = document.getElementById('dropdown-close');
    const dropdownTitle = document.getElementById('dropdown-title');
    const dropdownLogin = document.getElementById('dropdown-login');
    const dropdownUpload = document.getElementById('dropdown-upload');
    const dropdownMsg = document.getElementById('dropdown-msg');
    const dropdownUploadMsg = document.getElementById('dropdown-upload-msg');
    const adminEmail = document.getElementById('admin-email');
    const adminPass = document.getElementById('admin-pass');
    const adminLoginBtn = document.getElementById('admin-login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const updateBtn = document.getElementById('update-btn');
    const adminSidebarLink = document.getElementById('admin-sidebar-link');
    const fileTitle = document.getElementById('file-title');
    const fileAuthor = document.getElementById('file-author');
    const fileCategory = document.getElementById('file-category');
    const fileFormat = document.getElementById('file-format');
    const fileSize = document.getElementById('file-size');
    const fileUrls = document.getElementById('file-urls');
    const fileDesc = document.getElementById('file-desc');
    const editFileId = document.getElementById('edit-file-id');
    const newCategoryInput = document.getElementById('new-category-input');
    const addCategoryBtn = document.getElementById('add-category-btn');
    const categoryListAdmin = document.getElementById('category-list-admin');
    const categoryMsg = document.getElementById('category-msg');
    const deleteModal = document.getElementById('delete-modal');
    const deleteCancel = document.getElementById('delete-cancel');
    const deleteConfirm = document.getElementById('delete-confirm');
    const deleteFileName = document.getElementById('delete-file-name');
    const tabRow = document.getElementById('tab-row');
    const tabUpload = document.getElementById('tab-upload');
    const tabCategories = document.getElementById('tab-categories');
    const categoriesTabBtn = document.getElementById('categories-tab-btn');
    const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    let currentCategory = '';
    let isAdminLoggedIn = false;
    let isDropdownOpen = false;
    let allCategories = [];
    let deleteTargetId = null;

    // ==================== MOBILE SIDEBAR ====================
    function openSidebar() {
      document.getElementById('navigation-shell').classList.add('open');
      sidebarOverlay.classList.add('active');
    }
    function closeSidebar() {
      document.getElementById('navigation-shell').classList.remove('open');
      sidebarOverlay.classList.remove('active');
    }
    if (mobileMenuToggle) {
      mobileMenuToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const nav = document.getElementById('navigation-shell');
        if (nav.classList.contains('open')) closeSidebar();
        else openSidebar();
      });
    }
    if (sidebarOverlay) {
      sidebarOverlay.addEventListener('click', closeSidebar);
    }
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) closeSidebar();
    });

    // ==================== DROPDOWN ====================
    function toggleDropdown(forceState) {
      isDropdownOpen = (forceState !== undefined) ? forceState : !isDropdownOpen;
      if (isDropdownOpen) {
        dropdown.classList.add('open');
      } else {
        dropdown.classList.remove('open');
      }
    }

    function openDropdown(showUpload) {
      // Only show upload tab if user is admin
      const isAdmin = window.currentUserRole === 'admin';
      if (isAdmin) {
        tabRow.style.display = 'flex';
        categoriesTabBtn.style.display = 'inline-block';
        dropdownLogin.style.display = 'none';
        dropdownUpload.style.display = 'block';
        dropdownTitle.textContent = 'Admin';
        switchTab('upload');
        if (showUpload) resetUploadForm();
      } else {
        // If not admin, show only login (or nothing) – but we don't want to open the dropdown for non-admins at all.
        // We'll just close it.
        closeDropdown();
        return;
      }
      toggleDropdown(true);
    }

    function closeDropdown() {
      toggleDropdown(false);
    }
    if (dropdownClose) dropdownClose.addEventListener('click', closeDropdown);

    document.addEventListener('click', (e) => {
      if (isDropdownOpen) {
        const wrapper = document.querySelector('.connect-wrapper');
        let isTrigger = false;
        let target = e.target;
        const triggers = ['new-file-btn', 'new-file-icon', 'admin-sidebar-link'];
        while (target) {
          if (triggers.includes(target.id)) { isTrigger = true; break; }
          target = target.parentElement;
        }
        if (wrapper && !wrapper.contains(e.target) && !isTrigger) {
          closeDropdown();
        }
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-row button').forEach(el => el.classList.remove('active'));
      if (tab === 'upload') {
        if (tabUpload) tabUpload.classList.add('active');
        const btn = document.querySelector('[data-tab="upload"]');
        if (btn) btn.classList.add('active');
        resetUploadForm();
      } else if (tab === 'categories') {
        if (tabCategories) tabCategories.classList.add('active');
        const btn = document.querySelector('[data-tab="categories"]');
        if (btn) btn.classList.add('active');
        loadCategoriesAdmin();
      }
    }

    document.querySelectorAll('.tab-row button').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    function resetUploadForm() {
      if (fileTitle) fileTitle.value = '';
      if (fileAuthor) fileAuthor.value = '';
      if (fileFormat) fileFormat.value = '';
      if (fileSize) fileSize.value = '';
      if (fileUrls) fileUrls.value = '';
      if (fileDesc) fileDesc.value = '';
      if (editFileId) editFileId.value = '';
      if (uploadBtn) uploadBtn.style.display = 'block';
      if (updateBtn) updateBtn.style.display = 'none';
      if (dropdownUploadMsg) dropdownUploadMsg.textContent = '';
    }

    // ==================== SIDEBAR TOGGLE (DESKTOP) ====================
    const toggleBtn = document.getElementById('toggle-sidebar');
    const navShell = document.getElementById('navigation-shell');
    const toggleIcon = document.getElementById('toggle-icon');
    let isCollapsed = true;
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        isCollapsed = !isCollapsed;
        navShell.style.width = isCollapsed ? '56px' : '240px';
        const subSidebar = document.getElementById('sub-sidebar');
        if (isCollapsed) subSidebar.classList.add('hidden');
        else subSidebar.classList.remove('hidden');
      });
    }

    function switchView(view) {
      const overview = document.getElementById('menu-overview');
      const categories = document.getElementById('menu-categories');
      const settings = document.getElementById('menu-settings');
      const subSidebar = document.getElementById('sub-sidebar');
      const icons = document.querySelectorAll('.nav-icon-btn');
      icons.forEach(btn => btn.classList.remove('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40'));
      icons.forEach(btn => btn.classList.add('text-zinc-400', 'hover:text-zinc-200', 'hover:bg-zinc-800/40'));

      if (overview) overview.classList.add('hidden');
      if (categories) categories.classList.add('hidden');
      if (settings) settings.classList.add('hidden');

      if (view === 'overview') {
        if (overview) overview.classList.remove('hidden');
        if (icons[0]) icons[0].classList.add('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40');
      } else if (view === 'categories') {
        if (categories) categories.classList.remove('hidden');
        if (icons[1]) icons[1].classList.add('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40');
        if (window.currentUserRole === 'admin') loadCategoriesAdmin();
      } else if (view === 'settings') {
        if (settings) settings.classList.remove('hidden');
        if (icons[icons.length-2]) icons[icons.length-2].classList.add('text-emerald-400', 'bg-zinc-800/80', 'border', 'border-zinc-700/40');
      }
      if (window.innerWidth >= 768) {
        isCollapsed = false;
        navShell.style.width = '240px';
        if (subSidebar) subSidebar.classList.remove('hidden');
        if (toggleIcon) toggleIcon.className = 'fa-solid fa-bars-staggered';
      }
      if (window.innerWidth < 768) closeSidebar();
    }

    function setCategory(cat) {
      currentCategory = cat;
      if (categoryLabel) categoryLabel.textContent = cat ? cat : 'All categories';
      document.querySelectorAll('#category-nav .category-item, #category-list .category-item').forEach(el => {
        el.classList.toggle('bg-zinc-800/80', el.dataset.category === cat);
        el.classList.toggle('text-white', el.dataset.category === cat);
        el.classList.toggle('text-zinc-400', el.dataset.category !== cat);
      });
      loadFiles(searchInput ? searchInput.value : '', cat);
      switchView('overview');
    }

    // ==================== LOAD FILES (RBAC) ====================
    async function loadFiles(query = '', category = '') {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        if (fileList) fileList.innerHTML = `<div class="text-zinc-500 text-center py-8 text-xs">Please log in to view files.</div>`;
        return;
      }
      window.currentUserId = user.id;

      let supabaseQuery = supabaseClient.from('books').select('*, categories!left(name)');
      
      // Role-based filtering
      if (window.currentUserRole !== 'admin') {
        supabaseQuery = supabaseQuery.eq('user_id', user.id);
      }
      
      if (query.trim()) {
        supabaseQuery = supabaseQuery.textSearch('search_vector', query, { config: 'english', type: 'websearch' });
      }
      if (category) {
        const cat = allCategories.find(c => c.name === category);
        if (cat) supabaseQuery = supabaseQuery.eq('category_id', cat.id);
        else supabaseQuery = supabaseQuery.eq('category', category);
      }
      const { data, error, count } = await supabaseQuery.order('created_at', { ascending: false }).limit(100);
      if (error) {
        if (fileList) fileList.innerHTML = `<div class="text-zinc-500 text-center py-8 text-xs">⚠️ Error loading files</div>`;
        return;
      }
      if (totalCount) totalCount.textContent = count || 0;
      if (!data || data.length === 0) {
        if (fileList) fileList.innerHTML = `<div class="text-zinc-500 text-center py-8 text-xs">No files found. Add your first one using "New File".</div>`;
        return;
      }
      let html = '';
      data.forEach(file => {
        let urls = [];
        try { urls = JSON.parse(file.mirror_urls) || []; } catch { urls = [file.mirror_urls]; }
        if (!Array.isArray(urls)) urls = [urls];
        const valid = urls.filter(u => u && u.startsWith('http'));
        const categoryName = file.categories?.name || file.category || 'Uncategorized';
        const badge = `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-900/60 px-1.5 py-0.5 rounded text-[9px] font-medium">${categoryName}</span>`;
        const fileId = file.id;
        const isOwner = file.user_id === user.id;
        const isAdmin = window.currentUserRole === 'admin';
        const canEdit = isAdmin || isOwner;

        html += `
          <div class="file-row bg-[#171717] border border-zinc-800/80 rounded-lg p-3 flex flex-wrap items-center justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium text-zinc-200 truncate">${file.title}</div>
              <div class="flex flex-wrap items-center gap-1 text-xs text-zinc-400 mt-0.5">
                ${file.author ? `✍️ ${file.author}` : ''}
                ${badge}
                ${file.file_format ? `· ${file.file_format}` : ''}
                ${file.file_size_mb ? `· ${file.file_size_mb} MB` : ''}
                ${file.description ? `· ${file.description.substring(0, 40)}${file.description.length > 40 ? '…' : ''}` : ''}
                ${!isAdmin ? `<span class="text-[9px] text-zinc-500 ml-1">(owned)</span>` : ''}
              </div>
            </div>
            <div class="flex items-center gap-2 text-xs text-zinc-400 shrink-0">
              ${valid.length ? `<a href="${valid[0]}" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-black px-2 py-0.5 rounded font-medium transition">Open</a>` : ''}
              ${canEdit ? `<button onclick="editFile('${fileId}')" class="text-zinc-400 hover:text-emerald-400 transition" title="Edit"><i class="fa-solid fa-pen text-xs"></i></button>` : ''}
              ${canEdit ? `<button onclick="confirmDelete('${fileId}', '${file.title.replace(/'/g, "\\'")}')" class="text-zinc-400 hover:text-red-400 transition" title="Delete"><i class="fa-solid fa-trash text-xs"></i></button>` : ''}
            </div>
          </div>
        `;
      });
      if (fileList) fileList.innerHTML = html;
    }

    // ==================== CATEGORIES ====================
    async function loadCategories() {
      const { data, error } = await supabaseClient.from('categories').select('*').order('name');
      if (error || !data) {
        const { data: books, error: booksError } = await supabaseClient.from('books').select('category');
        if (!booksError && books) {
          const cats = [...new Set(books.map(b => b.category).filter(Boolean))];
          allCategories = cats.map(c => ({ id: c, name: c }));
          renderCategories(allCategories);
        }
        return;
      }
      allCategories = data;
      renderCategories(data);
      if (fileCategory) {
        const select = fileCategory;
        select.innerHTML = '<option value="">Select Category</option>';
        data.forEach(c => {
          select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
      }
    }

    function renderCategories(cats) {
      const list = categoryList;
      const nav = categoryNav;
      let html = cats.map(c => `
        <a href="#" class="category-item flex items-center space-x-2.5 px-2 py-1.5 rounded text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/30 transition" data-category="${c.name}" onclick="setCategory('${c.name}')">
          <i class="fa-solid fa-tag text-zinc-500 w-4 text-center"></i><span>${c.name}</span>
        </a>
      `).join('');
      if (list) list.innerHTML = html;
      if (nav) nav.innerHTML = `<div class="font-normal text-zinc-200 px-1 text-sm h-6 flex items-center">Filter by</div>` + html;
    }

    // ==================== CATEGORIES ADMIN (RBAC) ====================
    async function loadCategoriesAdmin() {
      if (window.currentUserRole !== 'admin') {
        if (categoryListAdmin) categoryListAdmin.innerHTML = '<div class="text-zinc-500 text-xs">Only admins can manage categories.</div>';
        return;
      }
      const { data, error } = await supabaseClient.from('categories').select('*').order('name');
      if (error || !data) {
        if (categoryListAdmin) categoryListAdmin.innerHTML = '<div class="text-zinc-500 text-xs">No categories</div>';
        return;
      }
      if (data.length === 0) {
        if (categoryListAdmin) categoryListAdmin.innerHTML = '<div class="text-zinc-500 text-xs">No categories yet</div>';
        return;
      }
      let html = '';
      data.forEach(c => {
        html += `
          <div class="flex items-center justify-between py-1.5 px-2 bg-zinc-900/50 rounded">
            <span class="text-zinc-300 text-sm">${c.name}</span>
            <button onclick="deleteCategory('${c.id}')" class="text-zinc-500 hover:text-red-400 transition text-xs"><i class="fa-solid fa-trash"></i></button>
          </div>
        `;
      });
      if (categoryListAdmin) categoryListAdmin.innerHTML = html;
    }

    async function addCategory() {
      if (window.currentUserRole !== 'admin') {
        if (categoryMsg) {
          categoryMsg.textContent = '❌ Only admins can add categories.';
          categoryMsg.className = 'msg error';
        }
        return;
      }
      const name = newCategoryInput ? newCategoryInput.value.trim() : '';
      if (!name) {
        if (categoryMsg) {
          categoryMsg.textContent = '❌ Please enter a category name.';
          categoryMsg.className = 'msg error';
        }
        return;
      }
      const { error } = await supabaseClient.from('categories').insert({ name });
      if (error) {
        if (categoryMsg) {
          categoryMsg.textContent = '❌ ' + error.message;
          categoryMsg.className = 'msg error';
        }
      } else {
        if (categoryMsg) {
          categoryMsg.textContent = '✅ Category added!';
          categoryMsg.className = 'msg success';
        }
        if (newCategoryInput) newCategoryInput.value = '';
        loadCategoriesAdmin();
        loadCategories();
        loadFiles(searchInput ? searchInput.value : '', currentCategory);
      }
    }

    async function deleteCategory(id) {
      if (window.currentUserRole !== 'admin') {
        alert('Only admins can delete categories.');
        return;
      }
      if (!confirm('Delete this category? Files in this category will become uncategorized.')) return;
      const { error } = await supabaseClient.from('categories').delete().eq('id', id);
      if (error) {
        if (categoryMsg) {
          categoryMsg.textContent = '❌ ' + error.message;
          categoryMsg.className = 'msg error';
        }
      } else {
        if (categoryMsg) {
          categoryMsg.textContent = '✅ Category deleted.';
          categoryMsg.className = 'msg success';
        }
        loadCategoriesAdmin();
        loadCategories();
        loadFiles(searchInput ? searchInput.value : '', currentCategory);
      }
    }

    if (addCategoryBtn) addCategoryBtn.addEventListener('click', addCategory);
    if (newCategoryInput) {
      newCategoryInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addCategory(); });
    }

    // ==================== EDIT / UPDATE / DELETE ====================
    window.editFile = async function(id) {
      if (window.currentUserRole !== 'admin') {
        alert('Only admins can edit files.');
        return;
      }
      if (!isDropdownOpen) openDropdown(true);
      else switchTab('upload');
      const { data, error } = await supabaseClient.from('books').select('*').eq('id', id).single();
      if (error || !data) {
        if (dropdownUploadMsg) {
          dropdownUploadMsg.textContent = '❌ Error loading file data.';
          dropdownUploadMsg.className = 'msg error';
        }
        return;
      }
      if (fileTitle) fileTitle.value = data.title || '';
      if (fileAuthor) fileAuthor.value = data.author || '';
      if (fileCategory) fileCategory.value = data.category_id || '';
      if (fileFormat) fileFormat.value = data.file_format || '';
      if (fileSize) fileSize.value = data.file_size_mb || '';
      if (fileUrls) fileUrls.value = data.mirror_urls ? JSON.stringify(data.mirror_urls).replace(/[\[\]"]/g, '') : '';
      if (fileDesc) fileDesc.value = data.description || '';
      if (editFileId) editFileId.value = id;
      if (uploadBtn) uploadBtn.style.display = 'none';
      if (updateBtn) updateBtn.style.display = 'block';
      if (dropdownUploadMsg) dropdownUploadMsg.textContent = '';
    };

    if (updateBtn) {
      updateBtn.addEventListener('click', async () => {
        if (window.currentUserRole !== 'admin') {
          alert('Only admins can update files.');
          return;
        }
        const id = editFileId ? editFileId.value : '';
        if (!id) {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '❌ No file selected for update.';
            dropdownUploadMsg.className = 'msg error';
          }
          return;
        }
        const title = fileTitle ? fileTitle.value.trim() : '';
        if (!title) {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '❌ Title is required.';
            dropdownUploadMsg.className = 'msg error';
          }
          return;
        }
        const urlsRaw = fileUrls ? fileUrls.value.trim() : '';
        const mirror_urls = urlsRaw ? urlsRaw.split(',').map(s => s.trim()).filter(s => s) : [];
        const payload = {
          title,
          author: fileAuthor ? fileAuthor.value.trim() || null : null,
          category_id: fileCategory ? fileCategory.value || null : null,
          file_format: fileFormat ? fileFormat.value.trim() || null : null,
          file_size_mb: fileSize ? parseFloat(fileSize.value) || null : null,
          mirror_urls: mirror_urls.length ? mirror_urls : null,
          description: fileDesc ? fileDesc.value.trim() || null : null,
          updated_at: new Date().toISOString(),
        };
        const { error } = await supabaseClient.from('books').update(payload).eq('id', id);
        if (error) {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '❌ ' + error.message;
            dropdownUploadMsg.className = 'msg error';
          }
        } else {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '✅ File updated successfully!';
            dropdownUploadMsg.className = 'msg success';
          }
          resetUploadForm();
          loadFiles(searchInput ? searchInput.value : '', currentCategory);
          setTimeout(() => closeDropdown(), 1500);
        }
      });
    }

    window.confirmDelete = function(id, name) {
      if (window.currentUserRole !== 'admin') {
        alert('Only admins can delete files.');
        return;
      }
      deleteTargetId = id;
      if (deleteFileName) deleteFileName.textContent = `"${name}" – this action cannot be undone.`;
      if (deleteModal) deleteModal.classList.add('active');
    };

    if (deleteCancel) {
      deleteCancel.addEventListener('click', () => {
        if (deleteModal) deleteModal.classList.remove('active');
        deleteTargetId = null;
      });
    }

    if (deleteConfirm) {
      deleteConfirm.addEventListener('click', async () => {
        if (window.currentUserRole !== 'admin') {
          alert('Only admins can delete files.');
          return;
        }
        if (!deleteTargetId) return;
        const { error } = await supabaseClient.from('books').delete().eq('id', deleteTargetId);
        if (deleteModal) deleteModal.classList.remove('active');
        if (error) {
          alert('Error deleting: ' + error.message);
        } else {
          loadFiles(searchInput ? searchInput.value : '', currentCategory);
        }
        deleteTargetId = null;
      });
    }

    if (deleteModal) {
      deleteModal.addEventListener('click', (e) => {
        if (e.target === deleteModal) {
          deleteModal.classList.remove('active');
          deleteTargetId = null;
        }
      });
    }

    // ==================== ADMIN AUTH + PROFILE FETCH ====================
    async function updateAdminUI(user) {
      if (user) {
        window.currentUserId = user.id;
        // Fetch user role from profiles
        const { data: profile, error: profileError } = await supabaseClient
          .from('profiles')
          .select('role')
          .eq('id', user.id)
          .single();

        if (profileError || !profile) {
          window.currentUserRole = 'user';
        } else {
          window.currentUserRole = profile.role;
        }

        if (adminStatusLabel) adminStatusLabel.textContent = 'Sign Out';
        if (adminToggleBtn) {
          adminToggleBtn.classList.add('bg-zinc-800', 'text-red-400', 'border-zinc-700');
        }
        isAdminLoggedIn = true;

        // Show admin-only elements if role is admin
        const isAdmin = window.currentUserRole === 'admin';
        if (isAdmin) {
          tabRow.style.display = 'flex';
          categoriesTabBtn.style.display = 'inline-block';
          newFileBtn.style.display = 'inline-block';
          newFileIcon.style.display = 'flex';
          adminSidebarLink.style.display = 'flex';
          // Also enable upload dropdown
        } else {
          tabRow.style.display = 'none';
          categoriesTabBtn.style.display = 'none';
          newFileBtn.style.display = 'none';
          newFileIcon.style.display = 'none';
          adminSidebarLink.style.display = 'none';
          // Close dropdown if open
          if (isDropdownOpen) closeDropdown();
        }

        if (dropdownLogin) dropdownLogin.style.display = 'none';
        if (dropdownUpload) dropdownUpload.style.display = 'block';
        if (dropdownTitle) dropdownTitle.textContent = 'Admin';
        resetUploadForm();
        if (isDropdownOpen) {
          setTimeout(() => closeDropdown(), 500);
        }
        // Reload files with new role
        loadFiles(searchInput ? searchInput.value : '', currentCategory);
      } else {
        window.currentUserRole = 'user';
        window.currentUserId = null;
        if (adminStatusLabel) adminStatusLabel.textContent = 'Connect';
        if (adminToggleBtn) {
          adminToggleBtn.classList.remove('bg-zinc-800', 'text-red-400', 'border-zinc-700');
        }
        isAdminLoggedIn = false;
        tabRow.style.display = 'none';
        categoriesTabBtn.style.display = 'none';
        newFileBtn.style.display = 'none';
        newFileIcon.style.display = 'none';
        adminSidebarLink.style.display = 'none';
        if (dropdownLogin) dropdownLogin.style.display = 'block';
        if (dropdownUpload) dropdownUpload.style.display = 'none';
        if (dropdownTitle) dropdownTitle.textContent = 'Admin Login';
        if (dropdownMsg) dropdownMsg.textContent = '';
        closeDropdown();
        if (fileList) fileList.innerHTML = `<div class="text-zinc-500 text-center py-8 text-xs">Please log in to view files.</div>`;
      }
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      updateAdminUI(session?.user || null);
    });
    supabaseClient.auth.getSession().then(({ data }) => {
      updateAdminUI(data.session?.user || null);
    });

    // LOGIN
    if (adminLoginBtn) {
      adminLoginBtn.addEventListener('click', async () => {
        const email = adminEmail ? adminEmail.value.trim() : '';
        const pass = adminPass ? adminPass.value : '';
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
        if (error) {
          if (dropdownMsg) {
            dropdownMsg.textContent = '❌ ' + error.message;
            dropdownMsg.className = 'msg error';
          }
        } else {
          if (dropdownMsg) {
            dropdownMsg.textContent = '✅ Login successful';
            dropdownMsg.className = 'msg success';
          }
        }
      });
    }

    if (logoutBtn) {
      logoutBtn.addEventListener('click', () => {
        supabaseClient.auth.signOut();
        closeDropdown();
      });
    }

    if (adminToggleBtn) {
      adminToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isAdminLoggedIn) {
          supabaseClient.auth.signOut();
          closeDropdown();
        } else {
          // Show login form
          if (dropdownLogin) dropdownLogin.style.display = 'block';
          if (dropdownUpload) dropdownUpload.style.display = 'none';
          if (dropdownTitle) dropdownTitle.textContent = 'Admin Login';
          if (dropdownMsg) dropdownMsg.textContent = '';
          openDropdown(false);
        }
      });
    }

    // ==================== UPLOAD FILE ====================
    if (uploadBtn) {
      uploadBtn.addEventListener('click', async () => {
        if (window.currentUserRole !== 'admin') {
          alert('Only admins can add files.');
          return;
        }
        const user = (await supabaseClient.auth.getUser()).data.user;
        if (!user) {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '❌ Please login first.';
            dropdownUploadMsg.className = 'msg error';
          }
          return;
        }
        const title = fileTitle ? fileTitle.value.trim() : '';
        if (!title) {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '❌ Title is required.';
            dropdownUploadMsg.className = 'msg error';
          }
          return;
        }
        const urlsRaw = fileUrls ? fileUrls.value.trim() : '';
        const mirror_urls = urlsRaw ? urlsRaw.split(',').map(s => s.trim()).filter(s => s) : [];
        const payload = {
          title,
          author: fileAuthor ? fileAuthor.value.trim() || null : null,
          category_id: fileCategory ? fileCategory.value || null : null,
          file_format: fileFormat ? fileFormat.value.trim() || null : null,
          file_size_mb: fileSize ? parseFloat(fileSize.value) || null : null,
          mirror_urls: mirror_urls.length ? mirror_urls : null,
          description: fileDesc ? fileDesc.value.trim() || null : null,
          user_id: user.id,
        };
        const { error } = await supabaseClient.from('books').insert(payload);
        if (error) {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '❌ ' + error.message;
            dropdownUploadMsg.className = 'msg error';
          }
        } else {
          if (dropdownUploadMsg) {
            dropdownUploadMsg.textContent = '✅ File added successfully!';
            dropdownUploadMsg.className = 'msg success';
          }
          resetUploadForm();
          loadFiles(searchInput ? searchInput.value : '', currentCategory);
          loadCategories();
          setTimeout(() => closeDropdown(), 1500);
        }
      });
    }

    // ==================== OPEN ADMIN DROPDOWN (TRIGGERS) ====================
    function openAdminDropdown() {
      if (window.currentUserRole === 'admin') {
        tabRow.style.display = 'flex';
        categoriesTabBtn.style.display = 'inline-block';
        dropdownLogin.style.display = 'none';
        dropdownUpload.style.display = 'block';
        dropdownTitle.textContent = 'Admin';
        resetUploadForm();
        switchTab('upload');
        openDropdown(true);
      } else {
        alert('Only admins can add files.');
      }
    }

    if (newFileBtn) {
      newFileBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openAdminDropdown();
      });
    }
    if (newFileIcon) {
      newFileIcon.addEventListener('click', (e) => {
        e.stopPropagation();
        openAdminDropdown();
      });
    }
    if (adminSidebarLink) {
      adminSidebarLink.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        openAdminDropdown();
      });
    }

    if (searchInput) {
      searchInput.addEventListener('input', (e) => { loadFiles(e.target.value, currentCategory); });
    }

    // ==================== INIT ====================
    loadCategories();
    if (!window.currentUserId) {
      if (fileList) fileList.innerHTML = `<div class="text-zinc-500 text-center py-8 text-xs">Please log in to view files.</div>`;
    }
  </script>
</body>
</html>
