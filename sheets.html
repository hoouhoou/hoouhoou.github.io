<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheets Redirect</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #121212; color: #e2e8f0; font-family: system-ui; margin: 0; padding: 2rem; }
    .container { max-width: 900px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between; margin-bottom: 2rem; }
    .top-bar a { color: #3ecf8e; text-decoration: none; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .btn { background: #2a2a2a; border: none; padding: 0.4rem 1rem; border-radius: 6px; color: #e2e8f0; cursor: pointer; }
    .btn-primary { background: #3ecf8e; color: #0b0e11; font-weight: 600; }
    .input-field { background: #0d0d0d; border: 1px solid #2e2e2e; border-radius: 6px; padding: 0.6rem; color: #e2e8f0; width: 100%; margin-bottom: 0.5rem; }
    .flex-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back</a>
      <span>Google Sheets Redirects</span>
    </div>
    <h1 class="text-2xl font-bold text-white">📊 Sheets Manager</h1>
    <p class="text-zinc-400">Add, edit, or delete links to your Google Sheets.</p>

    <!-- Add form -->
    <div class="card" id="add-form">
      <input id="title" class="input-field" placeholder="Title" />
      <input id="url" class="input-field" placeholder="Sheet URL" />
      <input id="desc" class="input-field" placeholder="Description (optional)" />
      <div class="flex-row">
        <button id="save-btn" class="btn btn-primary">Save</button>
        <button id="cancel-btn" class="btn">Cancel</button>
      </div>
      <div id="msg" class="text-sm text-zinc-400 mt-2"></div>
    </div>

    <!-- Search -->
    <input id="search" class="input-field" placeholder="Search..." style="max-width:300px;" />

    <!-- List -->
    <div id="list"></div>
  </div>

  <script>
    const STORAGE_KEY = 'sheets_redirects';
    let sheets = [];

    function load() {
      const stored = localStorage.getItem(STORAGE_KEY);
      sheets = stored ? JSON.parse(stored) : [
        { id: '1', title: 'Monthly Sales', url: 'https://docs.google.com/spreadsheets/d/1abc123/edit', description: 'Sales data' },
        { id: '2', title: 'Project Tracker', url: 'https://docs.google.com/spreadsheets/d/2def456/edit', description: 'Tasks' },
      ];
      save();
    }
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sheets)); }

    function render(filter = '') {
      const filtered = sheets.filter(s =>
        s.title.toLowerCase().includes(filter.toLowerCase()) ||
        (s.description && s.description.toLowerCase().includes(filter.toLowerCase()))
      );
      const list = document.getElementById('list');
      if (!filtered.length) {
        list.innerHTML = '<div class="text-zinc-500 text-center py-8">No sheets found.</div>';
        return;
      }
      list.innerHTML = filtered.map(s => `
        <div class="card">
          <div class="flex-row justify-between">
            <div>
              <div class="font-bold">${s.title}</div>
              ${s.description ? `<div class="text-zinc-400 text-sm">${s.description}</div>` : ''}
              <a href="${s.url}" target="_blank" class="text-emerald-400 text-sm">Open Sheet</a>
            </div>
            <div class="flex-row">
              <button class="btn edit-btn" data-id="${s.id}"><i class="fa-regular fa-pen-to-square"></i></button>
              <button class="btn btn-danger delete-btn" data-id="${s.id}"><i class="fa-regular fa-trash-can"></i></button>
            </div>
          </div>
        </div>
      `).join('');
      // attach events
      document.querySelectorAll('.edit-btn').forEach(b => b.onclick = () => edit(sheets.find(x => x.id === b.dataset.id)));
      document.querySelectorAll('.delete-btn').forEach(b => b.onclick = () => { if(confirm('Delete?')) { sheets = sheets.filter(x => x.id !== b.dataset.id); save(); render(document.getElementById('search').value); } });
    }

    let editingId = null;
    function edit(sheet) {
      editingId = sheet.id;
      document.getElementById('title').value = sheet.title;
      document.getElementById('url').value = sheet.url;
      document.getElementById('desc').value = sheet.description || '';
      document.getElementById('msg').textContent = 'Editing...';
    }
    function resetForm() {
      editingId = null;
      document.getElementById('title').value = '';
      document.getElementById('url').value = '';
      document.getElementById('desc').value = '';
      document.getElementById('msg').textContent = '';
    }

    document.getElementById('save-btn').onclick = () => {
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      if (!title || !url) { document.getElementById('msg').textContent = '❌ Title and URL required.'; return; }
      if (!url.startsWith('http')) { document.getElementById('msg').textContent = '❌ Invalid URL.'; return; }
      if (editingId) {
        const s = sheets.find(x => x.id === editingId);
        if (s) { s.title = title; s.url = url; s.description = document.getElementById('desc').value.trim(); }
      } else {
        sheets.push({ id: Date.now().toString(36), title, url, description: document.getElementById('desc').value.trim() });
      }
      save();
      resetForm();
      render(document.getElementById('search').value);
      document.getElementById('msg').textContent = '✅ Saved!';
    };
    document.getElementById('cancel-btn').onclick = resetForm;
    document.getElementById('search').oninput = (e) => render(e.target.value);

    load();
    render('');
  </script>
</body>
</html>
