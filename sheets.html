<!DOCTYPE html>
<html lang="en" class="h-full bg-[#121212]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Sheets Redirects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #121212;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
      width: 100%;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #3a3a3a; }
    .link-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f1f5f9;
    }
    .link-desc {
      font-size: 0.9rem;
      color: #94a3b8;
      margin: 4px 0 8px;
    }
    .link-url {
      font-size: 0.8rem;
      color: #3ecf8e;
      word-break: break-all;
      text-decoration: none;
    }
    .link-url:hover { text-decoration: underline; }
    .btn {
      background: #2a2a2a;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      color: #e2e8f0;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
    }
    .btn-primary {
      background: #3ecf8e;
      color: #0b0e11;
      font-weight: 600;
    }
    .btn-primary:hover { background: #2eb67d; }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover { background: #dc2626; }
    .input-field {
      background: #0d0d0d;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      color: #e2e8f0;
      width: 100%;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .input-field:focus {
      outline: none;
      border-color: #3ecf8e;
    }
    .flex-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .gap-2 { gap: 0.5rem; }
    .text-muted { color: #6b7280; font-size: 0.8rem; }
    .grid-list { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 640px) {
      .grid-list { grid-template-columns: 1fr 1fr; }
    }
    .badge {
      background: #2a2a2a;
      padding: 0.1rem 0.6rem;
      border-radius: 12px;
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .top-bar {
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .top-bar a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 500;
    }
    .top-bar a:hover { color: #3ecf8e; }
    .empty-state {
      text-align: center;
      padding: 3rem 0;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <!-- Top Navigation (optional – link back to main app) -->
  <div class="top-bar">
    <div>
      <a href="index.html" class="flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Back to File Manager
      </a>
    </div>
    <div>
      <span class="text-sm text-zinc-400"><i class="fa-regular fa-file-spreadsheet"></i> Sheets Redirect</span>
    </div>
  </div>

  <div class="container">
    <div class="flex-row justify-between items-start mb-4">
      <div>
        <h1 class="text-2xl font-bold text-white flex items-center gap-2">
          <i class="fa-regular fa-file-spreadsheet text-emerald-400"></i> Google Sheets Redirects
        </h1>
        <p class="text-zinc-400 text-sm">Quick links to your important sheets</p>
      </div>
      <button id="toggle-add-btn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add New</button>
    </div>

    <!-- Add/Edit Form (hidden by default) -->
    <div id="add-form" class="card" style="display:none;">
      <h3 class="text-white font-semibold mb-2"><i class="fa-regular fa-pen-to-square"></i> Add / Edit Link</h3>
      <input id="sheet-title" class="input-field" placeholder="Title (e.g., Sales Q1)" />
      <input id="sheet-url" class="input-field" placeholder="Google Sheets URL (full link)" />
      <input id="sheet-desc" class="input-field" placeholder="Description (optional)" />
      <div class="flex-row gap-2 mt-2">
        <button id="save-sheet-btn" class="btn btn-primary">Save</button>
        <button id="cancel-sheet-btn" class="btn">Cancel</button>
      </div>
      <div id="form-msg" class="text-sm mt-2 text-zinc-400"></div>
    </div>

    <!-- Search / Filter -->
    <div class="flex-row gap-2 mb-4">
      <input id="search-sheets" class="input-field" placeholder="Search titles or descriptions..." style="max-width:300px; margin:0;" />
      <span class="text-muted" id="count-display">0 links</span>
    </div>

    <!-- Link Grid -->
    <div id="sheet-grid" class="grid-list">
      <!-- Rows will be injected by JavaScript -->
      <div class="empty-state">Loading links...</div>
    </div>
  </div>

  <script>
    // ==================================================
    // LOCAL STORAGE – stores array of sheet objects
    // ==================================================
    const STORAGE_KEY = 'sheets_redirects';

    // Default sample data (you can replace or remove)
    const DEFAULT_SHEETS = [
      { id: '1', title: 'Monthly Sales Report', url: 'https://docs.google.com/spreadsheets/d/1abc123/edit', description: 'Sales data for all regions' },
      { id: '2', title: 'Project Tracker', url: 'https://docs.google.com/spreadsheets/d/2def456/edit', description: 'Tasks and milestones' },
      { id: '3', title: 'Inventory', url: 'https://docs.google.com/spreadsheets/d/3ghi789/edit', description: 'Stock levels' },
    ];

    // Load from localStorage or seed defaults
    let sheets = [];
    function loadSheets() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { sheets = JSON.parse(stored); } catch { sheets = []; }
      }
      if (!sheets || sheets.length === 0) {
        sheets = DEFAULT_SHEETS;
        saveSheets();
      }
    }
    function saveSheets() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sheets));
    }

    // DOM refs
    const grid = document.getElementById('sheet-grid');
    const searchInput = document.getElementById('search-sheets');
    const countDisplay = document.getElementById('count-display');
    const toggleAddBtn = document.getElementById('toggle-add-btn');
    const addForm = document.getElementById('add-form');
    const titleInput = document.getElementById('sheet-title');
    const urlInput = document.getElementById('sheet-url');
    const descInput = document.getElementById('sheet-desc');
    const saveBtn = document.getElementById('save-sheet-btn');
    const cancelBtn = document.getElementById('cancel-sheet-btn');
    const formMsg = document.getElementById('form-msg');

    let editingId = null; // if not null, we're editing

    // Render the grid
    function render(filter = '') {
      const filtered = sheets.filter(s =>
        s.title.toLowerCase().includes(filter.toLowerCase()) ||
        (s.description && s.description.toLowerCase().includes(filter.toLowerCase()))
      );
      countDisplay.textContent = `${filtered.length} link${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><i class="fa-regular fa-face-frown text-4xl mb-2"></i><p>No sheets found. Add one!</p></div>`;
        return;
      }

      let html = '';
      filtered.forEach(s => {
        html += `
          <div class="card" data-id="${s.id}">
            <div class="flex-row justify-between items-start">
              <div>
                <div class="link-title">${escapeHtml(s.title)}</div>
                ${s.description ? `<div class="link-desc">${escapeHtml(s.description)}</div>` : ''}
                <a href="${escapeHtml(s.url)}" target="_blank" class="link-url" rel="noopener">
                  <i class="fa-regular fa-arrow-up-right-from-square"></i> Open Sheet
                </a>
              </div>
              <div class="flex-row gap-1">
                <button class="btn edit-btn" data-id="${s.id}" style="padding:0.2rem 0.6rem;"><i class="fa-regular fa-pen-to-square"></i></button>
                <button class="btn btn-danger delete-btn" data-id="${s.id}" style="padding:0.2rem 0.6rem;"><i class="fa-regular fa-trash-can"></i></button>
              </div>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;

      // Attach event listeners for edit/delete buttons
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const sheet = sheets.find(s => s.id === id);
          if (sheet) startEdit(sheet);
        });
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          if (confirm('Delete this link?')) {
            sheets = sheets.filter(s => s.id !== id);
            saveSheets();
            render(searchInput.value);
          }
        });
      });
    }

    // Simple escape to prevent XSS
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe.replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // Start editing
    function startEdit(sheet) {
      editingId = sheet.id;
      titleInput.value = sheet.title;
      urlInput.value = sheet.url;
      descInput.value = sheet.description || '';
      addForm.style.display = 'block';
      toggleAddBtn.textContent = 'Cancel';
      formMsg.textContent = '';
      document.getElementById('toggle-add-btn').innerHTML = '<i class="fa-solid fa-xmark"></i> Cancel';
      // We'll change the button behavior temporarily – we'll handle via cancel button.
      // The toggle button will close the form.
    }

    // Reset form
    function resetForm() {
      editingId = null;
      titleInput.value = '';
      urlInput.value = '';
      descInput.value = '';
      formMsg.textContent = '';
      addForm.style.display = 'none';
      toggleAddBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Add New';
    }

    // Save (add or update)
    function saveSheet() {
      const title = titleInput.value.trim();
      const url = urlInput.value.trim();
      if (!title || !url) {
        formMsg.textContent = '❌ Title and URL are required.';
        return;
      }
      // Simple URL validation
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        formMsg.textContent = '❌ Please enter a valid URL (starts with http:// or https://).';
        return;
      }

      if (editingId) {
        // Update
        const index = sheets.findIndex(s => s.id === editingId);
        if (index !== -1) {
          sheets[index].title = title;
          sheets[index].url = url;
          sheets[index].description = descInput.value.trim() || '';
        }
      } else {
        // Add new
        const newId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        sheets.push({
          id: newId,
          title,
          url,
          description: descInput.value.trim() || ''
        });
      }
      saveSheets();
      resetForm();
      render(searchInput.value);
      formMsg.textContent = '✅ Saved!';
      setTimeout(() => { formMsg.textContent = ''; }, 2000);
    }

    // Event listeners
    toggleAddBtn.addEventListener('click', () => {
      if (addForm.style.display === 'block') {
        resetForm();
      } else {
        addForm.style.display = 'block';
        toggleAddBtn.innerHTML = '<i class="fa-solid fa-xmark"></i> Cancel';
        formMsg.textContent = '';
        if (editingId) { /* keep editing state */ }
      }
    });

    cancelBtn.addEventListener('click', resetForm);

    saveBtn.addEventListener('click', saveSheet);

    // Enter key on any input triggers save
    [titleInput, urlInput, descInput].forEach(inp => {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveSheet();
      });
    });

    searchInput.addEventListener('input', () => render(searchInput.value));

    // Initialize
    loadSheets();
    render('');

    // Also allow double-click on a card to open in new tab? optional.
  </script>
</body>
</html>
