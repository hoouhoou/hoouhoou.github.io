<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classics Archive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        #generator-panel {
            display: none;
            background: rgba(15, 17, 26, 0.95);
            margin: 20px 40px;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.1);
        }
        .tool-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1d24;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            outline: none;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        .preview-area {
            margin-top: 20px;
            background: #1a1d24;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }
        .search-container {
            padding: 20px 40px 0;
        }
        .search-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #1a1d24;
            border: 1px solid #333;
            color: white;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        .breadcrumb-nav {
            padding: 30px 40px 0;
            color: #64748b;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .breadcrumb-link {
            cursor: pointer;
            color: #8b5cf6;
        }
        .breadcrumb-link:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 40px; color: #8b5cf6; }
        .home-btn {
            cursor: pointer;
            margin-right: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div style="position: fixed; top: -10%; right: -10%; width: 600px; height: 600px; background: rgba(139, 92, 246, 0.08); filter: blur(120px); pointer-events: none;"></div>

    <header>
        <h1>CLASSICS<span style="font-weight:400; color:#64748b;">COLLECTION</span></h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span id="roleBadge" style="color:#8b5cf6; font-size:0.7rem; background:rgba(139,92,246,0.2); padding:4px 10px; border-radius:20px;"></span>
            <button id="toggleGenBtn" style="background: linear-gradient(45deg, #8b5cf6, #3b82f6); color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:bold;">DATABASE TOOLS</button>
            <button id="exitBtn" style="background:none; border:none; color:#64748b; cursor:pointer;">Exit</button>
            <button id="signOutBtn" style="background:none; border:none; color:#64748b; cursor:pointer; font-weight:bold; font-size: 0.8rem; letter-spacing: 1px;">SIGN OUT</button>
        </div>
    </header>

    <div id="generator-panel">
        <h2 style="margin-top:0; font-size:1rem; color: #8b5cf6; text-transform: uppercase;">Data Entry Node</h2>
        <textarea id="rawInput" class="tool-input" rows="4" placeholder="Paste raw content here... (you can use HTML tags like &lt;h3&gt; for headings)"></textarea>
        <input type="text" id="fileName" class="tool-input" placeholder="Output file name (without extension)" value="archive_node">
        <input type="text" id="newEvent" class="tool-input" placeholder="Event (e.g., THE TWILIGHT ZONE)">
        <input type="text" id="newYear" class="tool-input" placeholder="Year (e.g., 1960)">
        <input type="text" id="newMonth" class="tool-input" placeholder="Month (e.g., JANUARY)">
        <label class="option-label" style="display: block; margin: 10px 0; font-size:0.8rem; color:#ccc;">
            <input type="checkbox" id="autoNumberCheckbox" checked> Auto‑number lines (number each line sequentially)
        </label>
        <button id="generateBtn" style="width:100%; padding:12px; background: linear-gradient(90deg, #8b5cf6, #3b82f6); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">SAVE TO FIRESTORE</button>
        <div id="previewArea" class="preview-area"></div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search episodes...">
    </div>
    <div id="breadcrumb-nav" class="breadcrumb-nav">
        <span id="homeBtn" class="home-btn">🏠 HOME</span>
        ROOT / DASHBOARD
    </div>
    <div id="lists-container" class="archive-grid"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Shared script (contains all dashboard logic) -->
    <script src="script.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCix1ZIkpxIqG9l5wgEVZVzGzinwFx6SM",
            authDomain: "firefail-404.firebaseapp.com",
            projectId: "firefail-404",
            storageBucket: "firefail-404.firebasestorage.app",
            messagingSenderId: "313896700417"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        window.db = db;
        window.auth = auth;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '../index.html';
                return;
            }

            try {
                const idTokenResult = await user.getIdTokenResult();
                const isAdmin = idTokenResult.claims.admin === true;
                const role = isAdmin ? 'admin' : 'viewer';
                sessionStorage.setItem('userRole', role);
                document.getElementById('roleBadge').innerText = role.toUpperCase();

                if (window.initAfterAuth) {
                    window.initAfterAuth(role);
                } else {
                    console.error("initAfterAuth not found in script.js");
                }
            } catch (error) {
                console.error(error);
                document.getElementById('roleBadge').innerText = 'VIEWER';
            }
        });

        document.getElementById('signOutBtn').addEventListener('click', async () => {
            await auth.signOut();
            sessionStorage.removeItem('userRole');
            window.location.href = '../index.html';
        });
        document.getElementById('exitBtn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = '../index.html');
        });
    </script>
</body>
</html>
